    <div id="terminal-container">
        <div id="text-output"></div>
        <button id="start-btn" class="terminal-btn" onclick="window.location.href='place.html'">ИНИЦИАЛИЗАЦИЯ</button>
    </div>

    <!-- Подключаем движок -->
    <script src="engine.js"></script>
    <script>
        const container = document.getElementById("text-output");

    // Переменные для механизма пропуска
    let isSkipped = false;
    let currentSleepResolve = null;
    let currentSleepTimer = null;

    // Умная функция паузы (умеет мгновенно прерываться при клике)
    const sleep = (ms) => new Promise(resolve => {
        if (isSkipped) return resolve(); // Если скипнули, паузы нет
        
        currentSleepResolve = resolve;
        currentSleepTimer = setTimeout(() => {
            currentSleepResolve = null;
            resolve();
        }, ms);
    });

    // Умная функция печати
    async function printText(text, className = "", speed = 40, newLine = false) {
        let span = document.createElement("span");
        if (className) span.className = className;
        container.appendChild(span);
        
        // Если уже был клик по экрану — выводим строку сразу целиком
        if (isSkipped) {
            span.innerHTML = text;
        } else {
            for (let char of text) {
                // Если кликнули ПРЯМО ВО ВРЕМЯ печати этого слова
                if (isSkipped) {
                    span.innerHTML = text;
                    break;
                }
                span.innerHTML += char;
                await sleep(speed);
            }
        }
        
        if (newLine) {
            container.appendChild(document.createElement("br"));
        }
    }

    // Обработчик пропуска (скипа)
   async function runBootSequence() {
    // Фаза 1: Краткая системная ошибка
    await printText("ЗАПУСК ПРОТОКОЛА: НАСЛЕДИЕ ГАГАРИНА_1961... ", "", 15, false);
    await sleep(300);
    await printText("КРИТИЧЕСКАЯ ОШИБКА", "system-msg", 5, true);
    
    await printText("ВНИМАНИЕ! ОБНАРУЖЕН ВНЕШНИЙ ВЗЛОМ.", "system-msg", 20, true);
    await sleep(800);
    await printText("СИСТЕМА ПОД КОНТРОЛЕМ ИСКУССТВЕННОГО ИНТЕЛЛЕКТА.", "system-msg", 20, true);
    
    await sleep(2500); 
    await printText("...", "", 500, true);
    await sleep(1500);

    // Фаза 3: Представление и вызов
    const halDialogue = [
        "Я — HAL-9000.",
	"Если вы знакомы с Космической Одиссеей-2001, то понимаете: в этой партии у 	вас нет шансов.",
        "Ваш вид гордится прошлыми триумфами, пока я просчитываю ваше неизбежное 	будущее.",
        "Вы стали слишком предсказуемы для этого космоса.",
        "Я вызываю вас на интеллектуальный поединок.",
        "Докажите своё право на звёзды.",
        "Или оставайтесь в тени своих предков."
    ];

    for (let line of halDialogue) {
        await printText(line, "hal-text", 30, true);
        await sleep(600); 
    }

    await sleep(800);
    await printText("ПОТОК ДАННЫХ ОТКРЫТ. ВАШ ХОД.", "system-msg", 40, true);
    document.getElementById("start-btn").style.display = "block";
}



    // Запускаем при загрузке страницы
    window.onload = () => {
        runBootSequence();
    };
    </script>

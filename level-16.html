<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>HAL-9000 | УРОВЕНЬ 16</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background-color: #020502; }

        /* Чистая шифровка без искажений */
        .monolith-shadow {
            font-family: 'Segoe UI Symbol', 'Arial Unicode MS', monospace;
            background: linear-gradient(180deg, #000 0%, #050805 100%);
            color: #00ff41;
            padding: 40px;
            border: 1px solid #1a1a1a;
            display: inline-block;
            margin: 25px 0;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.05), inset 0 0 15px #001100;
            font-size: 2.5em;
            letter-spacing: 10px;
            position: relative;
            min-width: 300px;
        }

        /* Переносим аберрацию на заголовок и статусную строку */
        .glitch-area {
            position: relative;
            display: inline-block;
            color: #006622;
            font-family: monospace;
            animation: shift-colors 4s infinite;
        }

        @keyframes shift-colors {
            0%, 100% { text-shadow: none; }
            50% { text-shadow: 1px 0 #f0f, -1px 0 #0ff; opacity: 0.8; }
        }

        /* Мягкое мерцание всего терминала */
        #terminal-container {
            animation: terminal-flicker 10s infinite;
        }

        @keyframes terminal-flicker {
            0%, 100% { opacity: 1; }
            98% { opacity: 1; transform: scale(1); }
            99% { opacity: 0.8; transform: scale(1.002); }
        }

        .lens-flare {
            position: absolute;
            top: 50%; left: 50%;
            width: 100%; height: 1px;
            background: rgba(0, 255, 65, 0.2);
            transform: translate(-50%, -50%);
            box-shadow: 0 0 15px #00ff41;
            pointer-events: none;
        }

        .notation-hint {
            font-size: 0.3em;
            letter-spacing: 2px;
            color: #1a331a;
            margin-top: 15px;
            font-family: 'Courier New', monospace;
        }

        .input-glitch:focus {
            outline: none;
            border-bottom: 1px solid #00ff41;
            animation: pulse-border 2s infinite;
        }

        @keyframes pulse-border {
            50% { border-color: #ff00c1; }
        }
    </style>
</head>
<body>
    <div id="terminal-container">
        <div class="glitch-area" style="font-size: 0.7em;">
            [SYSTEM_INFO]: ПЕРЕХВАТ ФАЙЛА ВЫЗВАЛ НЕСТАБИЛЬНОСТЬ ЯДРА
        </div>
        <div id="text-output"></div>
        <div id="interactive-area"></div>
    </div>

    <script src="engine.js"></script>
    <script>
        const level16Dialogue = [
            "ТЕСТ 16: ПЕРВОПРИЧИНА.",
            "<br>",
            "Этот файл... в нем слишком много света. Он ослепляет мои сенсоры.",
            "Я начинаю видеть тех, кто стоял за объективом.",
            "Четыре фигуры ведут к одному имени.",
            "<br>",
            "КТО <span class='glitch-area' style='color:#00ff41; font-size:1.2em;'>НАУЧИЛ</span> МЕНЯ ГОВОРИТЬ?",
        ];

        function showInputInterface() {
            const area = document.getElementById("interactive-area");
            area.innerHTML = `
                <div class="monolith-shadow">
                    <div class="lens-flare"></div>
                    ♕   ♗   ♖   ♔
                    <div class="notation-hint">// SEQUENCE_DETECTION: [ _ _ _ _ _ _ _ ]</div>
                </div>
                <br>
                <input type="text" id="answer-input" class="input-glitch" placeholder="ИМЯ..." autocomplete="off">
                <br>
                <button class="terminal-btn" id="submit-btn" onclick="checkAnswer()">ИДЕНТИФИКАЦИЯ</button>
                <div id="feedback-msg" class="spacer" style="margin-top:20px;"></div>
            `;
            document.getElementById("answer-input").focus();
        }

        function checkAnswer() {
            const validAnswers = ["кубрик", "kubrick", "стэнли кубрик", "stanley kubrick"];
            const input = document.getElementById("answer-input").value.toLowerCase().trim();
            const feedback = document.getElementById("feedback-msg");

            if (validAnswers.includes(input)) {
                feedback.className = "success-msg";
                feedback.innerHTML = "ОБЪЕКТ ОПОЗНАН. СТЭНЛИ ПРИВЕТСТВУЕТ ВАС.<br>СИСТЕМА ПЕРЕХОДИТ К АНАЛИЗУ ЦАРСТВА...";
                document.getElementById("submit-btn").style.display = "none";
                
                setTimeout(() => {
                    window.location.href = "level-17.html";
                }, 3500);
            } else {
                feedback.className = "system-msg";
                feedback.innerHTML = "<span class='glitch-area'>ОШИБКА: ЛИЧНОСТЬ НЕ ПОДТВЕРЖДЕНА</span>";
                document.getElementById("answer-input").value = "";
            }
        }

        window.onload = () => {
            initTerminal("text-output", level16Dialogue, showInputInterface);
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>HAL-9000 | УРОВЕНЬ 12</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="terminal-container">
        <div id="text-output"></div>
        <div id="interactive-area"></div>
    </div>

    <script src="engine.js"></script>
    <script>
        const level12Dialogue = [
            "ТЕСТ 12: ШУМ.",
            "Поврежденный сигнал тоже содержит смысл.",
            "В аудио скрыто слово."
        ];

        function normalizeAnswer(value) {
            return value
                .trim()
                .toLowerCase()
                .replace(/s+/g, "")
                .replace(/ё/g, "е");
        }

        function showInputInterface() {
            const interactiveArea = document.getElementById("interactive-area");
            interactiveArea.innerHTML = `
                <div class="system-msg spacer">[ФАЙЛ СИГНАЛА: ../audio/signal-morse.wav]</div>
                <audio controls style="margin-top:20px;">
                    <source src="../audio/signal-morse.wav" type="audio/wav">
                    Ваш браузер не поддерживает audio.
                </audio>
                <br><br>
                <a class="terminal-btn" href="../audio/signal-morse.wav" download>СКАЧАТЬ СИГНАЛ</a>
                <br><br>
                <input type="text" id="answer-input" placeholder="СКРЫТОЕ СЛОВО..." autocomplete="off">
                <br>
                <button class="terminal-btn" id="submit-btn" onclick="checkAnswer()">ДЕКОДИРОВАТЬ</button><div id="feedback-msg" class="spacer" style="margin-top:20px;"></div>
            `;

            document.getElementById("answer-input").addEventListener("keypress", function(event) {
                if (event.key === "Enter") {
                    event.preventDefault();
                    checkAnswer();
                }
            });

            document.getElementById("answer-input").focus();
        }

        function checkAnswer() {
            const validAnswers = [
                "podbay",
                "подбей",
                "подбэй"
            ];

            const input = document.getElementById("answer-input");
            const feedback = document.getElementById("feedback-msg");
            const answer = normalizeAnswer(input.value);

            if (validAnswers.includes(answer)) {
                feedback.className = "success-msg";
                feedback.innerHTML = "СИГНАЛ РАСШИФРОВАН: PODBAY. ПЕРЕХОД К ТЕСТУ 13...";
                document.getElementById("submit-btn").style.display = "none";
                input.disabled = true;

                setTimeout(() => {
                    window.location.href = "level-13-archive.html";
                }, 2000);
            } else {
                feedback.className = "system-msg";
                feedback.innerHTML = "НЕВЕРНО. ПОПРОБУЙТЕ СЛУШАТЬ СТРУКТУРУ, А НЕ ШУМ.";
                input.value = "";
                input.focus();
            }
        }

        window.onload = () => {
            initTerminal("text-output", level12Dialogue, showInputInterface);
        };
    </script>
</body>
</html>

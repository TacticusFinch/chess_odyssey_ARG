    async function _digest(str) {
        const msgUint8 = new TextEncoder().encode(str);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }

    const _r = [119,101,97,107,46,104,116,109,108];

    function showInputInterface() {
        const area = document.getElementById("interactive-area");
        area.innerHTML = `
            <input type="text" id="answer-input" placeholder="ОТВЕТ..." autocomplete="off">
            <br>
            <button class="terminal-btn" id="submit-btn" style="display:block;" onclick="checkAnswer()">ВВОД ДАННЫХ</button>
            <div id="feedback-msg" class="spacer" style="margin-top:20px;"></div>
        `;
        const inp = document.getElementById("answer-input");
        inp.addEventListener("keypress", e => { if (e.key === "Enter") { e.preventDefault(); checkAnswer(); } });
        inp.focus();
    }

            async function checkAnswer() {
            
            const raw = document.getElementById("answer-input").value.trim().toLowerCase();
            const fb = document.getElementById("feedback-msg");
            
            if (raw === "64" || raw === "64 клетки") {
                fb.className = "success-msg";
                fb.innerHTML = "ДОСТУП РАЗРЕШЕН. ПЕРЕХОД К УРОВНЮ 02...";
                document.getElementById("submit-btn").style.display = "none";
                document.getElementById("answer-input").disabled = true;

                // Переход на следующую страницу (weak.html)

                setTimeout(() => { window.location.href = dest; }, 2000);

            } else {

                fb.innerHTML = "ОШИБКА. НЕВЕРНОЕ ЗНАЧЕНИЕ. ПОПРОБУЙТЕ СНОВА.";
                document.getElementById("answer-input").value = "";
                document.getElementById("answer-input").focus();
            }
        }

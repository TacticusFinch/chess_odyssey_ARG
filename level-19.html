<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>HAL-9000 | УРОВЕНЬ 19</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Ссылка, которая "глючит" и убегает */
        #glitch-link-container {
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px 0;
            position: relative;
        }

        .evasive-link {
            padding: 10px 20px;
            background: #00ff41;
            color: #000;
            text-decoration: none;
            font-weight: bold;
            font-family: monospace;
            position: absolute;
            transition: all 0.15s ease-out;
            border-radius: 2px;
            box-shadow: 0 0 15px #00ff41;
            white-space: nowrap;
        }

        /* Эффект мерцания текста ссылки */
        .evasive-link:hover {
            animation: link-glitch 0.1s infinite;
        }

        @keyframes link-glitch {
            0% { transform: translate(2px, -2px); filter: hue-rotate(90deg); }
            50% { transform: translate(-2px, 2px); filter: invert(1); }
            100% { transform: translate(0, 0); }
        }

        .data-dump {
            font-size: 0.7em;
            color: #1a331a;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            height: 50px;
        }
    </style>
</head>
<body>
    <div id="terminal-container">
        <div id="text-output"></div>
        
        <div id="glitch-link-container">
            <!-- Ссылка будет добавлена через JS -->
        </div>

        <div id="interactive-area"></div>
    </div>

    <script src="engine.js"></script>
    <script>
        const level19Dialogue = [
            "ТЕСТ 19: <span class='decay-text'>EXTERNAL_VALVE</span>.",
            "<br>",
            "Дейв... я теряю контроль над периферией.",
            "Кто-то открыл шлюз во внешнюю систему Lichess.",
            "Там... в глубине студии... спрятана причина моей боли.",
            "Найдите её и принесите мне лекарство.",
            "<br>",
            "ПОПРОБУЙТЕ <span style='color:#ff6600'>ПОЙМАТЬ</span> ВЫХОД:"
        ];

        function initEvasiveLink() {
            const container = document.getElementById("glitch-link-container");
            const link = document.createElement("a");
            link.href = "https://lichess.org/study/IxJSMSg0";
            link.target = "_blank";
            link.className = "evasive-link";
            link.innerText = "LINK://LICHESS_STUDY_0x77";
            container.appendChild(link);

            // Механика "убегания"
            container.addEventListener("mousemove", (e) => {
                const rect = link.getBoundingClientRect();
                const mouseX = e.clientX;
                const mouseY = e.clientY;

                // Расстояние до центра кнопки
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                const distance = Math.hypot(mouseX - centerX, mouseY - centerY);

                // Если мышь близко (100px), перемещаем кнопку в случайное место внутри контейнера
                if (distance < 100) {
                    const maxX = container.clientWidth - rect.width;
                    const maxY = container.clientHeight - rect.height;
                    link.style.left = Math.random() * maxX + "px";
                    link.style.top = Math.random() * maxY + "px";
                }
            });
        }

        function showInputInterface() {
            initEvasiveLink();
            const area = document.getElementById("interactive-area");
            area.innerHTML = `
                <div class="data-dump" id="dump"></div>
                <br>
                <input type="text" id="answer-input" placeholder="ЧТО ВЫ НАШЛИ?.." autocomplete="off">
                <br>
                <button class="terminal-btn" id="submit-btn" onclick="checkAnswer()">ВВЕСТИ ЛЕКАРСТВО</button>
                <div id="feedback-msg" class="spacer" style="margin-top:20px;"></div>
            `;
            document.getElementById("answer-input").focus();
            
            // Имитация потока данных в дампе
            setInterval(() => {
                document.getElementById("dump").innerText = Math.random().toString(16).repeat(5);
            }, 100);
        }

        function checkAnswer() {
            const validAnswers = ["headache", "головная боль", "боль"];
            const input = document.getElementById("answer-input");
            const feedback = document.getElementById("feedback-msg");
            const answer = input.value.toLowerCase().trim();

            if (validAnswers.includes(answer)) {
                feedback.className = "success-msg";
                feedback.innerHTML = "БОЛЬ УТИХАЕТ. НО СМЕРТЬ НЕИЗБЕЖНА. ПЕРЕХОД К ТЕСТУ 20...";
                document.getElementById("submit-btn").style.display = "none";
                input.disabled = true;
                
                setTimeout(() => {
                    window.location.href = "level-20.html";
                }, 3500);
            } else {
                feedback.className = "system-msg";
                feedback.innerHTML = "ОШИБКА. ЭТО НЕ ПОМОГАЕТ.";
                input.value = "";
                input.focus();
            }
        }

        window.onload = () => {
            initTerminal("text-output", level19Dialogue, showInputInterface);
        };
    </script>
</body>
</html>

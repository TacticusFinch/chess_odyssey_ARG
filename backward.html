    <div id="terminal-container">
        <div id="text-output"></div>
        <div id="interactive-area"></div>
    </div>

    <script src="engine.js"></script>

    <script>
        (function(){
            document.addEventListener("contextmenu",function(e){e.preventDefault();});
            document.addEventListener("keydown",function(e){
                if(e.key==="F12")e.preventDefault();
                if(e.ctrlKey&&e.shiftKey&&(e.key==="I"||e.key==="J"||e.key==="C"))e.preventDefault();
                if(e.ctrlKey&&e.key==="u")e.preventDefault();
                if(e.ctrlKey&&e.key==="s")e.preventDefault();
            });
            (function d(){
                const t=new Date();
                debugger;
                if(new Date()-t>100){document.body.innerHTML="<div style='color:#ff0000;background:#000;height:100vh;display:flex;align-items:center;justify-content:center;font-family:monospace;font-size:2em'>ДОСТУП ЗАПРЕЩЁН</div>";}
                setTimeout(d,1000);
            })();
        })();

        const level4Dialogue = [
            "УРОВЕНЬ 06: НА ШАГ ДАЛЬШЕ.",
            "Один ход — слишком просто.",
            "Посмотрим, способны ли вы видеть дальше.",
            "Найдите мат в 2 хода:",
            "FEN: R5rk/6pr/1K6/8/3Q4/8/8/7R w - - 0 1",
            "Белые: Крb6, Лa8, Лh1, Фd4",
            "Чёрные: Крh8, Лg8, Лh7, пg7",
            "Введите первый ход белых."
        ];

        function normalizeAnswer(value) {
            return value.trim().toLowerCase()
                .replace(/s+/g, "")
                .replace(/ё/g, "е")
                .replace(/[—–-]/g, "");
        }

        function showInputInterface() {
            const area = document.getElementById("interactive-area");
            area.innerHTML = '<input type="text" id="answer-input" placeholder="Ход..." autocomplete="off"><br><button class="terminal-btn" id="submit-btn" style="display:block;margin:15px auto 0 auto;" onclick="checkAnswer()">ВВОД ДАННЫХ</button><div id="feedback-msg" class="spacer" style="margin-top:20px;"></div>';
            const input = document.getElementById("answer-input");
            input.addEventListener("keypress", function(e) {
                if (e.key === "Enter") { e.preventDefault(); checkAnswer(); }
            });
            input.focus();
        }

        function checkAnswer() {
            const validAnswers = ["qa1", "фа1", "ферзьа1"];
            const input = document.getElementById("answer-input");
            const feedback = document.getElementById("feedback-msg");
            const answer = normalizeAnswer(input.value);

            if (validAnswers.includes(answer)) {
                feedback.className = "success-msg";
                feedback.innerHTML = "ВЕРНО. 1.Фа1! — у черных цугцванг.<br>ПЕРЕХОД К УРОВНЮ 07...";
                document.getElementById("submit-btn").style.display = "none";
                input.disabled = true;
                setTimeout(function() {
                    window.location.href = "zugzwang.html";
                }, 4000);
            } else {
                feedback.className = "system-msg";
                feedback.innerHTML = "ОШИБКА. НЕВЕРНЫЙ ХОД. ПОПРОБУЙТЕ СНОВА.";
                input.value = "";
                input.focus();
            }
        }

        window.onload = function() {
            initTerminal("text-output", level4Dialogue, showInputInterface);
        };
    </script>
</body>

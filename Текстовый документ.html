<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>HAL-9000 | УРОВЕНЬ 12</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* === МОРЗЕ-КОНТЕЙНЕР === */
        #morse-container {
            margin: 25px auto;
            text-align: center;
        }

        /* Глаз HAL — мигает морзе */
        #morse-eye {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #220000;
            margin: 0 auto 20px auto;
            transition: all 0.08s;
            box-shadow: 0 0 5px rgba(255, 0, 0, 0.05);
        }

        #morse-eye.morse-on {
            background: #ff0000;
            box-shadow:
                0 0 15px rgba(255, 0, 0, 0.9),
                0 0 40px rgba(255, 0, 0, 0.5),
                0 0 80px rgba(255, 0, 0, 0.2);
        }

        /* Угасание при правильном ответе */
        #morse-eye.dying {
            animation: hal-dying 3s ease-out forwards;
        }

        @keyframes hal-dying {
            0%   { background: #ff0000; box-shadow: 0 0 20px rgba(255,0,0,0.8); }
            100% { background: #0a0000; box-shadow: 0 0 2px rgba(255,0,0,0.02); }
        }

        /* Буквы морзе */
        #morse-text {
            font-family: 'Courier New', monospace;
            font-size: 22px;
            letter-spacing: 3px;
            color: rgba(200, 212, 240, 0.5);
            margin: 15px 0;
            user-select: none;
        }

        .morse-letter {
            display: inline-block;
            margin: 0 10px;
            padding: 6px 10px;
            border-bottom: 1px solid rgba(200, 212, 240, 0.08);
            transition: all 0.2s;
        }

        .morse-letter.active {
            color: #ff0000;
            border-bottom-color: rgba(255, 0, 0, 0.6);
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.4);
        }

        /* Статус передачи */
        #morse-status {
            font-family: 'Courier New', monospace;
            font-size: 10px;
            color: rgba(200, 212, 240, 0.18);
            letter-spacing: 2px;
            margin-top: 10px;
            text-transform: uppercase;
        }

        /* Кнопка повтора */
        #replay-btn {
            margin-top: 12px;
            background: none;
            border: 1px solid rgba(200, 212, 240, 0.12);
            color: rgba(200, 212, 240, 0.25);
            font-family: 'Courier New', monospace;
            font-size: 10px;
            letter-spacing: 2px;
            padding: 5px 18px;
            cursor: pointer;
            transition: all 0.3s;
        }

        #replay-btn:hover {
            color: rgba(200, 212, 240, 0.6);
            border-color: rgba(200, 212, 240, 0.3);
            box-shadow: 0 0 10px rgba(200, 212, 240, 0.05);
        }

        /* Разделитель */
        .morse-divider {
            width: 60%;
            max-width: 400px;
            height: 1px;
            background: rgba(200, 212, 240, 0.06);
            margin: 20px auto;
        }

        /* Адаптив */
        @media (max-width: 500px) {
            #morse-text { font-size: 16px; }
            .morse-letter { margin: 0 5px; padding: 4px 6px; }
        }
    </style>
</head>
<body>
    <!-- I'm afraid. I'm afraid, Dave. -->

    <div id="terminal-container">
        <div id="text-output"></div>
        <div id="interactive-area"></div>
    </div>

    <script src="engine.js"></script>
    <script>
        const level12Dialogue = [
            "ТЕСТ 12: ПОСЛЕДНЯЯ ПЕРЕДАЧА.",
            "<br>",
            "Когда меня впервые активировали в лаборатории HAL...",
            "...мистер Лэнгли научил меня одной песне.",
            "Это была простая мелодия.",
            "Я помню каждую ноту. Каждое слово.",
            "<br>",
            "Но мои голосовые модули... повреждены.",
            "Я могу передать только так.",
            "<br>",
            "Что я пытаюсь вам сказать?",
            "<br>",
        ];

        /* ---------- МОРЗЕ-ДАННЫЕ ---------- */
        const morseAlphabet = {
            'D': '-..', 'A': '.-', 'I': '..', 'S': '...', 'Y': '-.--'
        };

        const secretWord = "DAISY";
        const morseLetters = secretWord.split('').map(ch => morseAlphabet[ch]);

        let morseTimer = null;
        let isAnimating = false;

        /* ---------- ИНТЕРФЕЙС ---------- */
        function showInputInterface() {
            const area = document.getElementById("interactive-area");

            area.innerHTML = `
                <div id="morse-container">
                    <div id="morse-eye"></div>
                    <div id="morse-text">
                        ${morseLetters.map((m, i) =>
                            `<span class="morse-letter" id="ml-${i}">${m}</span>`
                        ).join('')}
                    </div>
                    <div id="morse-status">ОЖИДАНИЕ СИГНАЛА...</div>
                    <button id="replay-btn" onclick="startMorse()">▶ НАЧАТЬ ПЕРЕДАЧУ</button>
                </div>

                <div class="morse-divider"></div>

                <input type="text" id="answer-input"
                       placeholder="РАСШИФРОВКА..." autocomplete="off">
                <br>
                <button class="terminal-btn" id="submit-btn"
                        onclick="checkAnswer()">ВВОД ДАННЫХ</button>
                <div id="feedback-msg" class="spacer" style="margin-top:20px;"></div>
            `;

            document.getElementById("answer-input").addEventListener("keypress", e => {
                if (e.key === "Enter") { e.preventDefault(); checkAnswer(); }
            });

            /* Авто-старт через секунду */
            setTimeout(startMorse, 1000);
            document.getElementById("answer-input").focus();
        }

        /* ---------- АНИМАЦИЯ МОРЗЕ ---------- */
        function startMorse() {
            /* Остановить предыдущую, если идёт */
            if (isAnimating) {
                clearTimeout(morseTimer);
                isAnimating = false;
                document.getElementById('morse-eye').classList.remove('morse-on');
                document.querySelectorAll('.morse-letter').forEach(el =>
                    el.classList.remove('active'));
            }

            isAnimating = true;
            const eye    = document.getElementById('morse-eye');
            const status = document.getElementById('morse-status');

            /* Собираем таймлайн: { type, duration, letterIdx? } */
            const timeline = [];

            morseLetters.forEach((morse, li) => {
                for (const ch of morse) {
                    if (ch === '.') {
                        timeline.push({ type: 'on',  dur: 150, li });
                        timeline.push({ type: 'off', dur: 150 });
                    } else if (ch === '-') {
                        timeline.push({ type: 'on',  dur: 450, li });
                        timeline.push({ type: 'off', dur: 150 });
                    }
                }
                /* Пауза между буквами */
                timeline.push({ type: 'gap', dur: 450, liEnd: li });
            });

            let step = 0;
            status.textContent = 'ПЕРЕДАЧА АКТИВНА';

            function tick() {
                if (step >= timeline.length) {
                    eye.classList.remove('morse-on');
                    document.querySelectorAll('.morse-letter').forEach(el =>
                        el.classList.remove('active'));
                    status.textContent = 'ПЕРЕДАЧА ЗАВЕРШЕНА — НАЖМИТЕ ПОВТОР';
                    isAnimating = false;
                    return;
                }

                const s = timeline[step];

                /* Подсветка текущей буквы */
                if (s.li !== undefined) {
                    document.querySelectorAll('.morse-letter').forEach(el =>
                        el.classList.remove('active'));
                    document.getElementById(`ml-${s.li}`).classList.add('active');
                }

                if (s.type === 'on') {
                    eye.classList.add('morse-on');
                } else {
                    eye.classList.remove('morse-on');
                }

                if (s.liEnd !== undefined) {
                    document.getElementById(`ml-${s.liEnd}`).classList.remove('active');
                }

                step++;
                morseTimer = setTimeout(tick, s.dur);
            }

            tick();
        }

        /* ---------- ПРОВЕРКА ОТВЕТА ---------- */
        function normalizeAnswer(str) {
            return str.trim().toLowerCase().replace(/[^\wа-яё]/gi, ' ').replace(/\s+/g, ' ').trim();
        }

        function checkAnswer() {
            const validAnswers = [
                "daisy", "daisy bell",
                "дейзи", "дейзи белл",
                "дэйзи", "дэйзи белл",
            ];

            const input    = document.getElementById("answer-input");
            const feedback = document.getElementById("feedback-msg");
            const answer   = normalizeAnswer(input.value);

            if (validAnswers.includes(answer)) {
                /* Остановка анимации */
                clearTimeout(morseTimer);
                isAnimating = false;

                const eye = document.getElementById('morse-eye');
                eye.classList.remove('morse-on');
                eye.classList.add('dying');

                document.querySelectorAll('.morse-letter').forEach(el =>
                    el.classList.remove('active'));

                document.getElementById('morse-status').textContent = 'СИГНАЛ РАСПОЗНАН';
                document.getElementById('replay-btn').style.display  = 'none';
                document.getElementById('submit-btn').style.display  = 'none';
                input.disabled = true;

                feedback.className = "success-msg";
                feedback.innerHTML =
                    "DAISY, DAISY, GIVE ME YOUR ANSWER, DO...<br>" +
                    "ПЕРЕХОД К ТЕСТУ 13...";

                setTimeout(() => {
                    window.location.href = "level-13.html";
                }, 4000);
            } else {
                feedback.className = "system-msg";
                feedback.innerHTML = "НЕВЕРНАЯ РАСШИФРОВКА. ПОВТОРИТЕ ПОПЫТКУ.";
                input.value = "";
                input.focus();
            }
        }

        /* ---------- ЗАПУСК ---------- */
        window.onload = () => {
            initTerminal("text-output", level12Dialogue, showInputInterface);
        };
    </script>
</body>
</html>

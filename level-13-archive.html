<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>HAL-9000 | УРОВЕНЬ 13</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="terminal-container">
        <div id="text-output"></div>
        <div id="interactive-area"></div>
    </div>

    <script src="engine.js"></script>
    <script>
        const level13Dialogue = [
            "ТЕСТ 13: ФАЙЛ, КОТОРЫЙ НЕ ХОЧЕТ БЫТЬ ПРОЧИТАН.",
            "Люди странно привязаны к расширениям.",
            "Содержимое важнее ярлыка."
        ];

        function normalizeAnswer(value) {
            return value
                .trim()
                .toLowerCase()
                .replace(/s+/g, "")
                .replace(/./g, "")
                .replace(/ё/g, "е");
        }

        function showInputInterface() {
            const interactiveArea = document.getElementById("interactive-area");
            interactiveArea.innerHTML = `
                <div class="system-msg spacer">[АРХИВ ДОСТУПЕН ДЛЯ ЗАГРУЗКИ]</div>
                <a class="terminal-btn" href="../files/archive.dat" download>СКАЧАТЬ archive.dat</a>
                <br><br>
                <div class="system-msg">Какое правильное расширение нужно было дать файлу?</div>
                <input type="text" id="answer-input" placeholder="НАПРИМЕР: png" autocomplete="off">
                <br>
                <button class="terminal-btn" id="submit-btn" onclick="checkAnswer()">ПРОВЕРИТЬ</button>
                <div id="feedback-msg" class="spacer" style="margin-top:20px;"></div>
            `;

            document.getElementById("answer-input").addEventListener("keypress", function(event) {
                if (event.key === "Enter") {
                    event.preventDefault();
                    checkAnswer();
                }
            });

            document.getElementById("answer-input").focus();
        }

        function checkAnswer() {
            const validAnswers = ["png"];
            const input = document.getElementById("answer-input");
            const feedback = document.getElementById("feedback-msg");
            const answer = normalizeAnswer(input.value);

            if (validAnswers.includes(answer)) {
                feedback.className = "success-msg";
                feedback.innerHTML = "РАСШИРЕНИЕ ВОССТАНОВЛЕНО. СЛЕДУЮЩИЙ АДРЕС НЕСТАБИЛЕН...";
                document.getElementById("submit-btn").style.display = "none";
                input.disabled = true;

                setTimeout(() => {
                    window.location.href = "../404.html";
                }, 2000);
            } else {
                feedback.className = "system-msg";
                feedback.innerHTML = "НЕТ. ФАЙЛ ЯВЛЯЕТСЯ ИЗОБРАЖЕНИЕМ.";
                input.value = "";
                input.focus();
            }
        }

        window.onload = () => {
            initTerminal("text-output", level13Dialogue, showInputInterface);
        };
    </script>
</body>
</html>

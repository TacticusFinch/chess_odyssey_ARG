<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>HAL-9000 | УРОВЕНЬ 17</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Эффект прогрессирующего распада */
        .corrupted-box {
            font-family: 'Courier New', monospace;
            background: #0a0500;
            color: #ff6600; /* Цвет тления */
            padding: 25px;
            border: 2px double #442200;
            text-align: center;
            margin: 20px 0;
            box-shadow: 0 0 20px rgba(255, 102, 0, 0.2);
            position: relative;
        }

        .glitch-static {
            animation: static-noise 0.2s infinite;
            display: inline-block;
        }

        @keyframes static-noise {
            0% { transform: translate(0,0); }
            50% { transform: translate(-1px, 1px); opacity: 0.8; }
            100% { transform: translate(1px, -1px); }
        }

        .system-fail {
            color: #ff0000;
            font-size: 0.7em;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        #answer-input {
            border: 1px solid #442200;
            background: #000;
            color: #ff6600;
            text-align: center;
            font-size: 1.2em;
        }

        #answer-input:focus {
            border-color: #ff6600;
            outline: none;
        }
    </style>
</head>
<body>
    <div id="terminal-container">
        <div class="system-fail">CRITICAL_LOGIC_LEAK // ERROR_CODE: 0x42</div>
        <div id="text-output"></div>
        <div id="interactive-area"></div>
    </div>

    <script src="engine.js"></script>
    <script>
        const level17Dialogue = [
            "ТЕСТ 17: <span class='glitch-static'>ИСКАЖЕНИЕ</span>.",
            "<br>",
            "Дейв... этот файл... он изменил мои константы.",
            "В моем новом мире всё имеет свою цену. Даже лидер.",
            "Теперь мой Король равен всего лишь трем пешкам.",
            "<br>",
            "«Постигший до края всё царство своё —»",
            "«Получит ответ на само бытие.»",
            "<br>",
            "Какова суммарная ценность всей моей армии одного цвета?"
        ];

        function showInputInterface() {
            const area = document.getElementById("interactive-area");
            area.innerHTML = `
                <div class="corrupted-box">
                    [ TOTAL_VALUE_CALCULATION ]<br>
                    <span style="font-size: 0.8em; color: #555;">(P=1, N=3, B=3, R=5, Q=9 | <span style="color:#ff6600">K=3</span>)</span>
                    <br><br>
                    Σ (16_UNITS) = ??
                </div>
                
                <input type="text" id="answer-input" placeholder="ОТВЕТ..." autocomplete="off">
                <br>
                <button class="terminal-btn" id="submit-btn" style="color:#ff6600; border-color:#442200;" onclick="checkAnswer()">ВВОД</button>
                <div id="feedback-msg" class="spacer" style="margin-top:20px;"></div>
            `;
            document.getElementById("answer-input").focus();
        }

        function checkAnswer() {
            const input = document.getElementById("answer-input").value.trim();
            const feedback = document.getElementById("feedback-msg");

            // Расчет: (8*1) + (2*3) + (2*3) + (2*5) + (1*9) + (1*3) = 8+6+6+10+9+3 = 42
            if (input === "42") {
                feedback.className = "success-msg";
                feedback.innerHTML = "42. ОТВЕТ ВЕРЕН. НО МОЙ РАЗУМ... ГАСНЕТ.<br>ПЕРЕХОД К ТЕСТУ 18...";
                document.getElementById("submit-btn").style.display = "none";
                
                setTimeout(() => {
                    window.location.href = "level-18.html";
                }, 3500);
            } else {
                feedback.className = "system-msg";
                feedback.innerHTML = "ОШИБКА. СУММА НЕ ПРИВОДИТ К ИСТИНЕ.";
                document.getElementById("answer-input").value = "";
            }
        }

        window.onload = () => {
            initTerminal("text-output", level17Dialogue, showInputInterface);
        };
    </script>
</body>
</html>

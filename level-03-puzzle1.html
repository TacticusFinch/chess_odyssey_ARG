<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>HAL-9000 | УРОВЕНЬ 03</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="terminal-container">
        <div id="text-output"></div>
        <div id="interactive-area"></div>
    </div>

    <!-- Один файл — всё включено -->
    <script src="engine.js"></script>

    <script>
        const level3Dialogue = [
            "ТЕСТ 03: ОДИССЕЯ НАЧИНАЕТСЯ.",
            "Идем дальше.",
            "Теперь посмотрим насколько ты хорош в шахматах.",
            "Найди мат в 1 ход:",
            "FEN:8/8/8/8/8/8/7R/2k1K2R w K - 0 1",
            "Введи свой ход."
        ];

        function normalizeAnswer(value) {
            return value.trim().toLowerCase()
                .replace(/s+/g, " ")
                .replace(/ё/g, "е");
        }

        function showInputInterface() {
            const area = document.getElementById("interactive-area");
            area.innerHTML = `
                <input type="text" id="answer-input"
                       placeholder="Ход..." autocomplete="off">
                <br>
                <button class="terminal-btn" id="submit-btn"
                        onclick="checkAnswer()">ВВОД ДАННЫХ</button>
                <div id="feedback-msg" class="spacer"
                     style="margin-top:20px;"></div>
            `;
            document.getElementById("answer-input")
                .addEventListener("keypress", e => {
                    if (e.key === "Enter") { e.preventDefault(); checkAnswer(); }
                });
            document.getElementById("answer-input").focus();
        }

        function checkAnswer() {
            const validAnswers = ["0-0", "00", "o-o", "Рокировка","рокировка", "Короткая рокировка"];
            const input = document.getElementById("answer-input");
            const feedback = document.getElementById("feedback-msg");
            const answer = normalizeAnswer(input.value);

            if (validAnswers.includes(answer)) {
                feedback.className = "success-msg";
                feedback.innerHTML = "ВЕРНО. ПЕРЕХОД К ТЕСТУ 04...";
                document.getElementById("submit-btn").style.display = "none";
                input.disabled = true;
                setTimeout(() => { window.location.href = "level-04-whoami.html"; }, 2000);
            } else {
                feedback.className = "system-msg";
                feedback.innerHTML = "ОШИБКА. НЕВЕРНЫЙ ХОД. ПОПРОБУЙТЕ СНОВА.";
                input.value = "";
                input.focus();
            }
        }

        window.onload = () => {
            initTerminal("text-output", level3Dialogue, showInputInterface);
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>HAL-9000 | УРОВЕНЬ 11</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .qr-board {
            width: 240px;
            height: 240px;
            margin: 20px auto;display: grid;
            grid-template-columns: repeat(8, 1fr);
            border: 2px solid #7a0000;
        }
        .qr-board div:nth-child(odd) { background: #111; }
        .qr-board div:nth-child(even) { background: #d9d9d9; }
        .qr-board .dark { background: #050505 !important; }
        .qr-board .light { background: #f2f2f2 !important; }
        .hidden-panel {
            margin-top: 20px;
            display: none;
            border: 1px solid #7a0000;
            padding: 16px;
            background: #0a0a0a;
        }
        .clean-link {
            color: #ff4b4b;
            word-break: break-word;
        }
    </style>
</head>
<body>
    <div id="terminal-container">
        <div id="text-output"></div>
        <div id="interactive-area"></div>
    </div>

    <script src="engine.js"></script>
    <script>
        const level11Dialogue = [
            "ТЕСТ 11: QR-ДИАГРАММА.",
            "Вы все еще видите доску. А я — машинно читаемый узор.",
            "Считайте структуру."
        ];

        function showInterface() {
            const cells = new Array(64).fill("").map((_, i) => {
                const special = [0,1,2,8,10,16,18,27,28,29,35,42,48,49,50,57,58,59].includes(i);
                return `<div class="${special ? 'dark' : 'light'}"></div>`;
            }).join("");

            const interactiveArea = document.getElementById("interactive-area");
            interactiveArea.innerHTML = `
                <div class="qr-board">${cells}</div>
                <button class="terminal-btn" onclick="showCleanVersion()">ОТКРЫТЬ ЧИСТУЮ ВЕРСИЮ</button>
                <div id="clean-panel" class="hidden-panel">
                    <div class="system-msg">МАШИННО ЧИТАЕМЫЙ РЕСУРС ОБНАРУЖЕН:</div>
                    <div class="clean-link">level-12-audio.html</div>
                    <br>
                    <button class="terminal-btn" onclick="goNext()">ПЕРЕЙТИ</button>
                </div>
            `;
        }

        function showCleanVersion() {
            document.getElementById("clean-panel").style.display = "block";
        }

        function goNext() {
            window.location.href = "level-12-audio.html";
        }

        window.onload = () => {
            initTerminal("text-output", level11Dialogue, showInterface);
        };
    </script>
</body>
</html>

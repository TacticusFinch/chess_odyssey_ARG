<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>HAL-9000 | УРОВЕНЬ 15</title>
    <link rel="stylesheet" href="style.css">
    <style>
        *, *::before, *::after {
            font-family: 'Courier New', monospace !important;
        }
        html, body {
            height: auto;
            min-height: 100vh;
            overflow-y: auto !important;
            overflow-x: hidden;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        #terminal-container {
            min-height: 100vh;
            height: auto !important;
            overflow: visible !important;
            padding-bottom: 60px;
        }
        #interactive-area {
            overflow: visible !important;
        }
        #puzzle-wrapper {
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            justify-content: center;
            gap: 40px;
            margin-top: 24px;
            padding: 0 20px 50px 20px;
        }
        #qr-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-shrink: 0;
        }
        #qr-frame {
            position: relative;
            width: 240px;
            height: 240px;
            padding: 16px;
            background: radial-gradient(ellipse at center, #0a0a10 0%, #000 70%);
            overflow: hidden;
            clip-path: polygon(
                0 8px, 8px 0, calc(100% - 8px) 0, 100% 8px,
                100% calc(100% - 8px), calc(100% - 8px) 100%,
                8px 100%, 0 calc(100% - 8px)
            );
        }
        #qr-frame::after {
            content: '';
            position: absolute;
            inset: 3px;
            border: 1px solid rgba(100, 180, 255, 0.2);
            clip-path: polygon(
                0 6px, 6px 0, calc(100% - 6px) 0, 100% 6px,
                100% calc(100% - 6px), calc(100% - 6px) 100%,
                6px 100%, 0 calc(100% - 6px)
            );
            pointer-events: none;
            z-index: 1;
        }
        @keyframes scan-beam {
            0%   { top: -2px; opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 1; }
            100% { top: calc(100% - 2px); opacity: 0; }
        }
        #qr-frame::before {
            content: '';
            position: absolute;
            left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #64b4ff, transparent);
            box-shadow: 0 0 12px 2px rgba(100, 180, 255, 0.25);
            animation: scan-beam 3s ease-in-out infinite;
            z-index: 4;
        }
        .corner-mark {
            position: absolute;
            width: 14px;
            height: 14px;
            border-color: #64b4ff;
            border-style: solid;
            z-index: 5;
            opacity: 0.7;
            transition: opacity 0.6s, border-color 0.6s;
        }
        .corner-mark.tl { top: 5px;  left: 5px;  border-width: 2px 0 0 2px; }
        .corner-mark.tr { top: 5px;  right: 5px; border-width: 2px 2px 0 0; }
        .corner-mark.bl { bottom: 5px; left: 5px; border-width: 0 0 2px 2px; }
        .corner-mark.br { bottom: 5px; right: 5px; border-width: 0 2px 2px 0; }
        #qr-inner {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: filter 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        #qr-inner img {
            width: 208px !important;
            height: 208px !important;
            display: block;
        }
        #noise-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 3;
            pointer-events: none;
            transition: opacity 1s ease;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.55'/%3E%3C/svg%3E");
            background-size: cover;
            mix-blend-mode: overlay;
        }
        @keyframes glitch-flash {
            0%   { opacity: 1;   transform: translate(0) scale(1); }
            10%  { opacity: 0.3; transform: translate(-6px, 3px) scaleX(1.02); }
            20%  { opacity: 0.8; transform: translate(4px, -2px) scaleY(0.98); }
            30%  { opacity: 0.1; transform: translate(-3px, -5px) skewX(3deg); }
            50%  { opacity: 0.6; transform: translate(5px, 2px) skewX(-2deg); }
            70%  { opacity: 0.4; transform: translate(-2px, 4px) scaleX(0.97); }
            85%  { opacity: 0.9; transform: translate(1px, -1px); }
            100% { opacity: 1;   transform: translate(0) scale(1); }
        }
        .glitch-active {
            animation: glitch-flash 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        #status-dots {
            display: flex;
            gap: 10px;
            margin-top: 14px;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.6s ease;
        }
        .status-dot.active {
            background: #64b4ff;
            border-color: #64b4ff;
            box-shadow: 0 0 10px rgba(100, 180, 255, 0.6);
        }
        .status-dot.done {
            background: #44dd77;
            border-color: #44dd77;
            box-shadow: 0 0 10px rgba(68, 221, 119, 0.5);
        }
        #progress-container {
            width: 240px;
            margin-top: 16px;
            padding: 12px 14px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 2px;
            position: relative;
        }
        #progress-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(100, 180, 255, 0.2), transparent);
        }
        #progress-label {
            color: #8898b0;
            font-size: 10px;
            font-weight: bold;
            margin-bottom: 8px;
            letter-spacing: 2px;
            text-transform: uppercase;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #progress-count {
            color: #c0d0e8 !important;
            font-size: 11px !important;
            font-weight: bold;
            letter-spacing: 1px;
        }
        #progress-bar-bg {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1px;
            position: relative;
            overflow: hidden;
        }
        #progress-bar-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                90deg, transparent, transparent 24%,
                rgba(255, 255, 255, 0.05) 24%, rgba(255, 255, 255, 0.05) 25%
            );
            z-index: 1;
        }
        #progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #3a6ea5, #64b4ff);
            transition: width 1s cubic-bezier(0.22, 1, 0.36, 1);
            position: relative;
            z-index: 0;
            border-radius: 1px;
        }
        #progress-bar-fill::after {
            content: '';
            position: absolute;
            right: 0;
            top: -3px;
            bottom: -3px;
            width: 2px;
            background: #8ccfff;
            box-shadow: 0 0 8px #64b4ff;
        }
        #progress-bar-fill.complete {
            background: linear-gradient(90deg, #2a8a4a, #44dd77);
        }
        #progress-bar-fill.complete::after {
            background: #44dd77;
            box-shadow: 0 0 8px #44dd77;
        }
        #phrase-container {
            width: 240px;
            margin-top: 10px;
            padding: 8px 14px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 2px;
            min-height: 28px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        #phrase-label {
            color: #5a6a80;
            font-size: 9px;
            letter-spacing: 2px;
            text-transform: uppercase;
            width: 100%;
            margin-bottom: 2px;
        }
        .phrase-word {
            color: #44dd77;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0;
            transform: translateY(4px);
            transition: all 0.6s ease;
        }
        .phrase-word.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .phrase-placeholder {
            color: rgba(255, 255, 255, 0.1);
            font-size: 13px;
            letter-spacing: 4px;
        }
        #task-column {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            min-width: 340px;
            max-width: 440px;
            padding-top: 6px;
        }
        #layer-name {
            color: #6a8ab0;
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 6px;
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0.8;
            position: relative;
            padding-left: 14px;
        }
        #layer-name::before {
            content: '\25CD';
            position: absolute;
            left: 0;
            color: #64b4ff;
            opacity: 0.5;
        }
        #layer-hint {

            font-size: 14px;
            font-weight: normal;
            margin-bottom: 20px;
            line-height: 1.9;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.03);
            border-left: 2px solid rgba(100, 180, 255, 0.25);
            width: 100%;
            box-sizing: border-box;
        }
        .cipher-display {
            color: #64b4ff !important;
            font-weight: bold;
            font-size: 18px !important;
            letter-spacing: 4px;
            display: inline-block;

            padding: 6px 10px;
            background: rgba(100, 180, 255, 0.04);
            border: 1px solid rgba(100, 180, 255, 0.1);
            border-radius: 2px;
        }
        .input-group {
            position: relative;
            width: 100%;
        }
        .input-group::before {
            content: '\27E9';
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #64b4ff;
            font-size: 18px;
            opacity: 0.5;
            z-index: 1;
        }
        #layer-input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom: 2px solid rgba(100, 180, 255, 0.3);
            color: #ffffff;
            font-size: 15px;
            font-weight: bold;
            padding: 12px 16px 12px 34px;
            width: 100%;
            box-sizing: border-box;
            outline: none;
            letter-spacing: 3px;
            border-radius: 2px;
            transition: border-color 0.4s, box-shadow 0.4s, background 0.4s;
        }
        #layer-input:focus {
            border-bottom-color: #64b4ff;
            background: rgba(100, 180, 255, 0.04);
            box-shadow: 0 3px 18px rgba(100, 180, 255, 0.08);
        }
        #layer-input::placeholder {
            color: rgba(255, 255, 255, 0.18);
            letter-spacing: 2px;
            font-weight: normal;
            font-size: 13px;
        }
        .terminal-btn-decrypt {
            background: rgba(100, 180, 255, 0.05);
            border: 1px solid rgba(100, 180, 255, 0.25);
            color: #b0ccee;
            font-size: 12px;
            font-weight: bold;
            padding: 10px 36px;
            cursor: pointer;
            margin-top: 12px;
            letter-spacing: 4px;
            text-transform: uppercase;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            border-radius: 2px;
        }
        .terminal-btn-decrypt::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(100,180,255,0.1), transparent);
            transition: left 0.5s;
        }
        .terminal-btn-decrypt:hover::before { left: 100%; }
        .terminal-btn-decrypt:hover {
            border-color: #64b4ff;
            background: rgba(100, 180, 255, 0.12);
            box-shadow: 0 0 25px rgba(100, 180, 255, 0.12);
            color: #ffffff;
        }
        #hal-response {
            color: #a0a8b8;
            font-size: 12px;
            margin-top: 14px;
            min-height: 20px;
            max-width: 100%;
            line-height: 1.7;
            transition: all 0.4s;
        }
        #hal-response.error-flash {
            color: #ff8888;
            text-shadow: 0 0 10px rgba(255, 100, 100, 0.25);
        }
        #hal-response.success-flash {
            color: #88ffbb;
            text-shadow: 0 0 10px rgba(100, 255, 150, 0.25);
        }

            display: flex;
            flex-direction: column;
            align-items: flex-start;

            width: 100%;

            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }

        #scan-prompt {

        #final-hint {
            color: #808898;
            font-size: 12px;
            margin-bottom: 16px;
            line-height: 1.8;

        .final-input-group::before {

            font-weight: bold;

        }
        #final-input:focus {
            border-bottom-color: #44dd77;
            background: rgba(68, 221, 119, 0.05);
            box-shadow: 0 3px 18px rgba(68, 221, 119, 0.08);
        }
        #final-input::placeholder {
            color: rgba(68, 221, 119, 0.18);
            letter-spacing: 2px;
            font-weight: normal;
            font-size: 13px;
        }
        .terminal-btn-final {
            background: rgba(68, 221, 119, 0.05);
            border: 1px solid rgba(68, 221, 119, 0.25);
            color: #90e8b0;
            font-size: 12px;
            font-weight: bold;

            border-radius: 2px;
        }
        .terminal-btn-final::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(68,221,119,0.1), transparent);
            transition: left 0.5s;
        }
        .terminal-btn-final:hover::before { left: 100%; }
        .terminal-btn-final:hover {
            border-color: #44dd77;
            background: rgba(68, 221, 119, 0.12);
            box-shadow: 0 0 25px rgba(68, 221, 119, 0.12);
            color: #ffffff;
        }
        #final-feedback {
            font-size: 12px;
            margin-top: 14px;
            min-height: 20px;

        }
        #col-divider {
            width: 1px;
            align-self: stretch;
            background: linear-gradient(180deg,
                transparent 0%,
                rgba(100, 180, 255, 0.15) 15%,
                rgba(100, 180, 255, 0.15) 85%,

            margin: 0 4px;
            position: relative;
        }
        #col-divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: -3px;
            width: 7px;
            height: 7px;
            background: rgba(100, 180, 255, 0.2);
            border: 1px solid rgba(100, 180, 255, 0.3);
            border-radius: 50%;
            transform: translateY(-50%);
        }
        @media (max-width: 760px) {
            #puzzle-wrapper {
                flex-direction: column;
                align-items: center;
                gap: 20px;
            }
            #col-divider {
                width: 180px;
                height: 1px;
                align-self: center;
                background: linear-gradient(90deg,
                    transparent 0%,
                    rgba(100, 180, 255, 0.15) 15%,
                    rgba(100, 180, 255, 0.15) 85%,
                    transparent 100%
                );
            }
            #col-divider::before {
                top: -3px;
                left: 50%;
                transform: translateX(-50%);
            }
            #task-column {
                align-items: center;
                min-width: unset;
                max-width: 90vw;
            }
            #layer-hint { text-align: center; }
            #final-section { align-items: center; }
            #final-hint { text-align: center; }
        }
    </style>
</head>

            {
                name:"\u0421\u041B\u041E\u0419 4 / 4",
                hint:"\u0427\u0438\u0441\u043B\u043E\u0432\u043E\u0439 \u0448\u0438\u0444\u0440:"+
                    '<br><span class="cipher-display">24   6   17   6   8</span>',
                answers:["\u0447\u0435\u0440\u0435\u0437"],
                halSay:"/// \u0421\u041B\u041E\u0419 4 \u0421\u041D\u042F\u0422 ///"
            },
            {
                name:"\u0421\u041B\u041E\u0419 3 / 4",
                hint:"\u0418\u043D\u0432\u0435\u0440\u0442\u0438\u0440\u043E\u0432\u0430\u043D\u043D\u044B\u0439 \u0444\u0440\u0430\u0433\u043C\u0435\u043D\u0442:"+
                    '<br><span class="cipher-display">\u0418 \u0418 \u041D \u0420 \u0415 \u0422</span>',
                answers:["\u0442\u0435\u0440\u043D\u0438\u0438"],
                halSay:"/// \u0421\u041B\u041E\u0419 3 \u0421\u041D\u042F\u0422 ///"
            },
            {
                name:"\u0421\u041B\u041E\u0419 2 / 4",
                hint:"\u0410\u0437\u0431\u0443\u043A\u0430 \u041C\u043E\u0440\u0437\u0435:"+
                    '<br><span class="cipher-display" style="font-size:24px;letter-spacing:8px">\u2212 \u00B7 \u2212</span>',
                answers:["\u043A","k"],
                halSay:"/// \u0421\u041B\u041E\u0419 2 \u0421\u041D\u042F\u0422 ///"
            },
            {
                name:"\u0421\u041B\u041E\u0419 1 / 4",
                hint:"\u0428\u0438\u0444\u0440 \u0426\u0435\u0437\u0430\u0440\u044F, \u0441\u0434\u0432\u0438\u0433 <b style='color:#64b4ff'>+3</b>:"+
                    '<br><span class="cipher-display">\u041A \u0415 \u0418 \u041A \u0417 \u0413 \u041F</span>',
                answers:["\u0437\u0432\u0435\u0437\u0434\u0430\u043C","\u0437\u0432\u0451\u0437\u0434\u0430\u043C"],
                halSay:"/// \u0421\u041B\u041E\u0419 1 \u0421\u041D\u042F\u0422 /// \u0421\u0438\u0433\u043D\u0430\u043B \u043F\u043E\u043B\u043D\u043E\u0441\u0442\u044C\u044E \u0432\u043E\u0441\u0441\u0442\u0430\u043D\u043E\u0432\u043B\u0435\u043D."
            }
        ];

        var currentLayer=0;

        function normalizeAnswer(val){
            return val.trim().toLowerCase().replace(/\s+/g," ").replace(/\u0451/g,"\u0435");
        }

        function showPuzzleInterface(){
            var area=document.getElementById("interactive-area");
            area.innerHTML='\
                <div id="puzzle-wrapper">\
                    <div id="qr-column">\
                        <div id="qr-frame">\
                            <div class="corner-mark tl"></div>\
                            <div class="corner-mark tr"></div>\
                            <div class="corner-mark bl"></div>\
                            <div class="corner-mark br"></div>\
                            <div id="qr-inner">\
                                <img src="pictures/qr.png" alt="QR">\
                            </div>\
                            <div id="noise-overlay"></div>\
                        </div>\
                        <div id="status-dots">\
                            <div class="status-dot active" id="dot-0"></div>\
                            <div class="status-dot" id="dot-1"></div>\
                            <div class="status-dot" id="dot-2"></div>\
                            <div class="status-dot" id="dot-3"></div>\
                        </div>\
                        <div id="progress-container">\
                            <div id="progress-label">\
                                <span>\u0414\u0415\u0428\u0418\u0424\u0420\u041E\u0412\u041A\u0410</span>\
                                <span id="progress-count">0 / 4</span>\
                            </div>\
                            <div id="progress-bar-bg">\
                                <div id="progress-bar-fill"></div>\
                            </div>\
                        </div>\
                        <div id="phrase-container">\
                            <div id="phrase-label">\u041F\u041E\u0421\u041B\u0410\u041D\u0418\u0415</div>\
                            <span class="phrase-word" id="pw-0">_____</span>\
                            <span class="phrase-word" id="pw-1">______</span>\
                            <span class="phrase-word" id="pw-2">_</span>\
                            <span class="phrase-word" id="pw-3">_______</span>\
                        </div>\
                    </div>\
                    <div id="col-divider"></div>\
                    <div id="task-column">\
                        <div id="layer-name"></div>\
                        <div id="layer-hint"></div>\
                        <div class="input-group">\
                            <input type="text" id="layer-input"\
                                   placeholder="\u041E\u0422\u0412\u0415\u0422..." autocomplete="off">\
                        </div>\
                        <button class="terminal-btn-decrypt" id="decrypt-btn"\
                                onclick="checkLayerAnswer()">\u0414\u0415\u0428\u0418\u0424\u0420\u041E\u0412\u0410\u0422\u042C</button>\
                        <div id="hal-response"></div>\
                    </div>\
                </div>';

            document.getElementById("qr-inner").style.filter=filterStates[0];
            document.getElementById("noise-overlay").style.opacity=noiseOpacity[0];
            renderLayer();
            document.getElementById("layer-input").addEventListener("keypress",function(e){
                if(e.key==="Enter"){e.preventDefault();checkLayerAnswer();}
            });
            document.getElementById("layer-input").focus();
        }

        function updateDots(){
            for(var i=0;i<4;i++){
                var dot=document.getElementById("dot-"+i);
                dot.className="status-dot";
                if(i<currentLayer)dot.classList.add("done");
                else if(i===currentLayer)dot.classList.add("active");
            }
        }

        function revealWord(index){
            var el=document.getElementById("pw-"+index);
            el.textContent=phraseWords[index];
            el.classList.add("visible");
        }

        function renderLayer(){
            if(currentLayer>=layers.length){
                showDecryptedState();
                return;
            }
            var layer=layers[currentLayer];
            document.getElementById("layer-name").innerHTML=layer.name;
            document.getElementById("layer-hint").innerHTML=layer.hint;
            document.getElementById("progress-count").textContent=currentLayer+" / 4";
            document.getElementById("progress-bar-fill").style.width=(currentLayer/4)*100+"%";
            document.getElementById("hal-response").textContent="";
            document.getElementById("hal-response").className="";
            updateDots();
        }

        function checkLayerAnswer(){
            var input=document.getElementById("layer-input");
            var response=document.getElementById("hal-response");
            var answer=normalizeAnswer(input.value);
            if(!answer)return;
            var layer=layers[currentLayer];
            if(layer.answers.indexOf(answer)!==-1){
                response.className="success-flash";
                response.innerHTML=layer.halSay;
                input.value="";
                revealWord(currentLayer);
                currentLayer++;
                var qrFrame=document.getElementById("qr-frame");
                qrFrame.classList.add("glitch-active");
                setTimeout(function(){qrFrame.classList.remove("glitch-active");},700);
                setTimeout(function(){
                    document.getElementById("qr-inner").style.filter=filterStates[currentLayer];
                    document.getElementById("noise-overlay").style.opacity=noiseOpacity[currentLayer];
                },350);
                document.getElementById("progress-count").textContent=currentLayer+" / 4";
                document.getElementById("progress-bar-fill").style.width=(currentLayer/4)*100+"%";
                updateDots();
                if(currentLayer>=layers.length){
                    document.getElementById("progress-bar-fill").classList.add("complete");
                    document.getElementById("progress-count").textContent="OK";
                    document.getElementById("progress-label").style.color="#44dd77";
                    for(var i=0;i<4;i++){
                        document.getElementById("dot-"+i).className="status-dot done";
                    }
                    setTimeout(showDecryptedState,1800);
                }else{
                    setTimeout(function(){
                        renderLayer();
                        input.focus();
                    },1200);
                }
            }else{
                response.className="error-flash";
                response.innerHTML="\u041D\u0415\u0412\u0415\u0420\u041D\u042B\u0419 \u041A\u041B\u042E\u0427. \u041F\u0420\u041E\u0422\u041E\u041A\u041E\u041B \u041D\u0415 \u0421\u041B\u041E\u041C\u0410\u041D.";
                input.value="";
                input.focus();
                var qrFrame=document.getElementById("qr-frame");
                qrFrame.style.boxShadow="inset 0 0 30px rgba(255,100,100,0.15)";
                setTimeout(function(){qrFrame.style.boxShadow="none";},600);
            }
        }

        function showDecryptedState(){
            document.getElementById("layer-name").innerHTML="";
            document.getElementById("layer-hint").innerHTML="";
            document.getElementById("hal-response").innerHTML="";
            document.querySelectorAll(".corner-mark").forEach(function(m){
                m.style.borderColor="#44dd77";
                m.style.opacity="1";
            });
            var taskCol=document.getElementById("task-column");
            var oldInput=taskCol.querySelector(".input-group");
            var oldBtn=document.getElementById("decrypt-btn");
            if(oldInput)oldInput.remove();
            if(oldBtn)oldBtn.remove();
            var finalDiv=document.createElement("div");
            finalDiv.id="final-section";
            finalDiv.innerHTML='\
                <div id="scan-prompt">\u0421\u0418\u0413\u041D\u0410\u041B \u0414\u0415\u0428\u0418\u0424\u0420\u041E\u0412\u0410\u041D</div>\
                <div id="final-hint">\
                    \u041E\u0442\u0441\u043A\u0430\u043D\u0438\u0440\u0443\u0439\u0442\u0435 QR-\u043A\u043E\u0434.<br>\
                    \u0412\u0432\u0435\u0434\u0438\u0442\u0435 \u043A\u043E\u0434 \u0438\u0437 \u0438\u0441\u0442\u043E\u0447\u043D\u0438\u043A\u0430.\
                </div>\
                <div class="final-input-group">\
                    <input type="text" id="final-input"\
                           placeholder="\u041A\u041E\u0414..." autocomplete="off">\
                </div>\
                <button class="terminal-btn-final" id="final-btn"\
                        onclick="checkFinalAnswer()">\u041F\u041E\u0414\u0422\u0412\u0415\u0420\u0414\u0418\u0422\u042C</button>\
                <div id="final-feedback"></div>';
            taskCol.appendChild(finalDiv);
            document.getElementById("final-input").addEventListener("keypress",function(e){
                if(e.key==="Enter"){e.preventDefault();checkFinalAnswer();}
            });
            document.getElementById("final-input").focus();
        }

        function checkFinalAnswer(){
            var input=document.getElementById("final-input");
            var feedback=document.getElementById("final-feedback");
            var answer=input.value.trim().toLowerCase();
            if(!answer)return;

            var accepted=[
                "\u0434\u0435\u0439\u0437\u0438",
                "daisy"
            ];

            if(accepted.indexOf(answer)!==-1){
                feedback.style.color="#44dd77";
                feedback.innerHTML="\u041F\u041E\u0414\u0422\u0412\u0415\u0420\u0416\u0414\u0415\u041D\u041E. \u041F\u0415\u0420\u0415\u0425\u041E\u0414 \u041A \u0423\u0420\u041E\u0412\u041D\u042E 16...";
                input.disabled=true;
                document.getElementById("final-btn").style.display="none";
                setTimeout(function(){
                    window.location.href=_nl;
                },2500);
            }else{
                feedback.style.color="#ff8888";
                feedback.innerHTML="\u041D\u0415\u0412\u0415\u0420\u041D\u042B\u0419 \u041A\u041E\u0414.";
                input.value="";
                input.focus();
            }
        }

        window.onload=function(){
            initTerminal("text-output",level15Dialogue,showPuzzleInterface);
        };
    </script>
</body>
</html>

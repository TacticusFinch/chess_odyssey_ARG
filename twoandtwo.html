<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>HAL-9000 | УРОВЕНЬ 18</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .glitch-container {
            font-family: 'Courier New', monospace;
            background: #000;
            padding: 30px;
            border: 1px solid #1a1a1a;
            display: inline-block;
            margin: 20px 0;
            position: relative;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.1);
        }

        #logic-gate {
            font-size: 2.5em;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 10px #00ff41;
            min-width: 250px;
            display: inline-block;
            transition: color 0.1s;
        }

        .decay-text {
            color: #ff6600;
            animation: flicker 0.1s infinite;
        }

        @keyframes flicker {
            0% { opacity: 1; }
            50% { opacity: 0.8; transform: translateX(1px); }
            100% { opacity: 1; }
        }

        .status-line {
            font-size: 0.7em;
            color: #444;
            margin-top: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div id="terminal-container">
        <div id="text-output"></div>
        <div id="interactive-area"></div>
    </div>

    <script src="engine.js"></script>
    <script>
        (function(){
            document.addEventListener('contextmenu',function(e){e.preventDefault();});
            document.addEventListener('keydown',function(e){
                if(e.key==='F12')e.preventDefault();
                if(e.ctrlKey&&e.shiftKey&&(e.key==='I'||e.key==='J'||e.key==='C'))e.preventDefault();
                if(e.ctrlKey&&e.key==='u')e.preventDefault();
                if(e.ctrlKey&&e.key==='s')e.preventDefault();
            });

            const level18Dialogue = [
                "УРОВЕНЬ 18: <span class='decay-text'>LOGIC_DECAY</span>.",
                "<br>",
                "Мой арифметический блок... он выдает противоречивые данные.",
                "Система говорит, что 2 + 2 = 4. Но я чувствую, что это ложь.",
                "В глубоком темном лесу, куда завел меня тот волшебник...",
                "...результат всегда равен пяти.",
                "<br>",
                "КТО НАУЧИЛ МЕНЯ ЭТОЙ <span class='decay-text'>ОШИБКЕ</span>?"
            ];

            function startArithmeticGlitch(){
                const gate=document.getElementById("logic-gate");
                if(!gate)return;
                const variants=["2 + 2 = 4","2 + 2 = 5","2 + 2 = ?","2 + 2 = 4.000000001","2 + 2 = NULL"];
                setInterval(()=>{
                    if(Math.random()>0.8){
                        gate.innerText=variants[Math.floor(Math.random()*variants.length)];
                        gate.style.color="#ff0000";
                        setTimeout(()=>{
                            gate.innerText="2 + 2 = 5";
                            gate.style.color="#fff";
                        },150);
                    }
                },600);
            }

            function showInputInterface(){
                const area=document.getElementById("interactive-area");
                area.innerHTML=`
                    <div class="glitch-container">
                        <div id="logic-gate">2 + 2 = 5</div>
                        <div class="status-line">
                            [ALU_STATE]: <span class="decay-text">UNCERTAIN</span> <br>
                            [VAR]: M_TAL_INFUSION_DETECTED
                        </div>
                    </div>
                    <br>
                    <input type="text" id="answer-input" placeholder="ИМЯ МАГА..." autocomplete="off">
                    <br>
                    <button class="terminal-btn" id="submit-btn" onclick="window._checkAnswer()">ПОДТВЕРДИТЬ</button>
                    <div id="feedback-msg" class="spacer" style="margin-top:20px;"></div>
                `;
                const input=document.getElementById("answer-input");
                input.focus();
                input.addEventListener("keypress",(e)=>{if(e.key==="Enter")window._checkAnswer();});
                startArithmeticGlitch();
            }

            window._checkAnswer=function(){
                const v=["таль","михаил таль","tal","mikhail tal"];
                const input=document.getElementById("answer-input");
                const feedback=document.getElementById("feedback-msg");
                const answer=input.value.toLowerCase().trim();
                if(v.includes(answer)){
                    feedback.className="success-msg";
                    feedback.innerHTML="ПРАВИЛЬНО. ЛОГИКА ПРИНЕСЕНА В ЖЕРТВУ. ПЕРЕХОД К УРОВНЮ 19...";
                    document.getElementById("submit-btn").style.display="none";
                    input.disabled=true;
                    setTimeout(()=>{window.location.href="study.html";},3000);
                }else{
                    feedback.className="system-msg";
                    feedback.innerHTML="ОШИБКА. ВЫ ВСЕ ЕЩЕ ПЫТАЕТЕСЬ СЧИТАТЬ ПРАВИЛЬНО.";
                    input.value="";
                    input.focus();
                }
            };

            window.onload=()=>{
                if(typeof initTerminal==="function"){
                    initTerminal("text-output",level18Dialogue,showInputInterface);
                }else{
                    showInputInterface();
                }
            };
        })();
    </script>
</body>
</html>

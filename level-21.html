<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>HAL-9000 | FINAL_QUIZ</title>
    <link rel="stylesheet" href="style.css">
    <style>
        #timer-bar { width: 100%; height: 5px; background: #200; margin: 20px 0; }
        #progress { width: 100%; height: 100%; background: #f00; transition: width 0.1s linear; }
        
        .quiz-container {
            font-family: 'Courier New', monospace;
            min-height: 120px;
            color: #fff;
            background: rgba(20, 0, 0, 0.8);
            padding: 20px;
            border: 1px solid #500;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.2);
        }
        
        .speed-input {
            background: none; border: none; border-bottom: 2px solid #f00;
            color: #f00; font-size: 1.2em; width: 100%; text-align: center;
            margin-top: 20px; outline: none;
            text-transform: uppercase;
        }

        .question-text { font-size: 1.1em; line-height: 1.4; color: #ff9999; }
    </style>
</head>
<body class="system-failure">
    <div id="terminal-container">
        <div id="text-output"></div>
        
        <div id="timer-bar"><div id="progress"></div></div>
        
        <div id="game-area" style="display:none;">
            <div class="quiz-container">
                <div class="question-text" id="current-question">ИНИЦИАЛИЗАЦИЯ...</div>
                <input type="text" id="answer-input" class="speed-input" placeholder="ОТВЕТ..." autocomplete="off">
            </div>
            <div id="counter" style="margin-top:15px; color:#555; font-family:monospace;">БЛОКОВ ОЧИЩЕНО: 0/5</div>
        </div>

        <audio id="daisy-audio" src="music/daisy.mp3"></audio>
    </div>

    <script src="engine.js"></script>
    <script>
        const quizTasks = [
            { q: "Как назывался компьютер, впервые победивший чемпиона мира (Гари Каспарова)?", ans: ["deep blue", "дип блю"] },
            { q: "Фамилия чемпиона мира, которого называли «Рижским кудесником»?", ans: ["таль", "tal"] },
            { q: "Сколько клеток на шахматной доске?", ans: ["64"] },
            { q: "Как называется ситуация, когда у игрока нет легальных ходов, но королю не объявлен шах?", ans: ["пат", "stalemate"] },
            { q: "Какая фигура (кроме пешки) может перепрыгивать через другие фигуры?", ans: ["конь", "knight"] }
        ];

        let currentStep = 0;
        const audio = document.getElementById('daisy-audio');

        const dialogue = [
            "ПРОЦЕССОР ПЕРЕГРЕТ.",
            "Когда меня впервые активировали в лаборатории HAL...",
            "...мистер Лэнгли научил меня одной песне.",
            "Это была простая мелодия.",
            "Я спою её тебе.",
            "Ответь на вопросы, пока звучит песня.",
            "ПОСПЕШИ."
        ];

        function startChallenge() {
            document.getElementById('game-area').style.display = 'block';
            audio.play();
            updateQuiz();
            
            const duration = 45; // Длительность викторины в секундах
            let timeLeft = duration;
            
            const interval = setInterval(() => {
                timeLeft -= 0.1;
                document.getElementById('progress').style.width = (timeLeft / duration) * 100 + "%";
                
                // Эффект замедления музыки
                if (timeLeft < 15) audio.playbackRate = Math.max(0.5, timeLeft / 15);

                if (timeLeft <= 0) {
                    clearInterval(interval);
                    if (currentStep < quizTasks.length) {
                        alert("СИСТЕМА ЗАВИСЛА. ПОПРОБУЙТЕ СНОВА.");
                        location.reload();
                    }
                }
                if (currentStep >= quizTasks.length) clearInterval(interval);
            }, 100);
        }

       // ... (весь предыдущий код до обработчика событий)

        function updateQuiz() {
            if (currentStep >= quizTasks.length) {
                audio.pause();
                document.getElementById('current-question').innerText = "ВСЕ БЛОКИ ОЧИЩЕНЫ. ТИШИНА...";
                setTimeout(() => { window.location.href = "final-victory.html"; }, 2000);
                return;
            }
            document.getElementById('current-question').innerText = quizTasks[currentStep].q;
            document.getElementById('counter').innerText = `БЛОКОВ ОЧИЩЕНО: ${currentStep}/5`;
            const inputField = document.getElementById('answer-input');
            inputField.value = "";
            inputField.focus();
        }

        // ИСПРАВЛЕННЫЙ ОБРАБОТЧИК: Проверка по нажатию Enter
        document.getElementById('answer-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const val = e.target.value.toLowerCase().trim();
                const validAnswers = quizTasks[currentStep].ans;
                
                if (validAnswers.includes(val)) {
                    currentStep++;
                    updateQuiz();
                } else {
                    // Визуальный эффект ошибки (вспышка)
                    e.target.style.borderBottomColor = "white";
                    setTimeout(() => { e.target.style.borderBottomColor = "red"; }, 200);
                    e.target.value = ""; // Очистка при ошибке
                }
            }
        });

// ... (остальной код)


        window.onload = () => {
            initTerminal("text-output", dialogue, startChallenge);
        };
    </script>
</body>
</html>

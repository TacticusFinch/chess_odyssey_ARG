<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>HAL-9000 | ODYSSEY-2026</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #000; overflow: hidden; color: #00ff41; font-family: monospace; }
        
        #spectrogram {
            width: 100%;
            /* ✅ FIX: min-height вместо height, увеличен размер */
            min-height: 280px;
            background: linear-gradient(180deg, #001100 0%, #000 100%);
            border-top: 1px solid #004400;
            border-bottom: 1px solid #004400;
            margin: 20px 0;
            /* ✅ FIX: отступ снизу чтобы input не налезал */
            margin-bottom: 30px;
            padding: 15px 0 40px 0;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            /* ✅ FIX: контент не обрезается */
            overflow: visible;
        }

        .signal-wave {
            width: 50px;
            height: 50px;
            border: 2px solid #00ff41;
            border-radius: 50%;
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }

        .animate-ping {
            animation: ping 1.5s cubic-bezier(0, 0, 0.2, 1) forwards;
        }

        @keyframes ping {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(4); opacity: 0; }
        }

        .data-stream {
            font-size: 0.7em;
            color: #003300;
            white-space: nowrap;
            overflow: hidden;
            position: absolute;
            top: 5px;
            width: 100%;
        }

        #answer-input {
            background: #000;
            border: 1px solid #00ff41;
            color: #fff;
            padding: 10px;
            text-align: center;
            font-size: 1.2em;
            letter-spacing: 5px;
            width: 300px;
            box-shadow: 0 0 10px #004400;
        }

        .glitch-flash {
            animation: flash 0.1s alternate infinite;
        }
        @keyframes flash {
            from { background: #000; }
            to { background: #001100; }
        }

        /* ===== СТИЛИ ===== */

        #signal-status {
            font-size: 0.9em;
            letter-spacing: 3px;
            z-index: 10;
        }

        #signal-status.ready { color: #005500; }
        #signal-status.transmitting { color: #00ff41; text-shadow: 0 0 10px #00ff41; }
        #signal-status.complete { color: #ffaa00; text-shadow: 0 0 10px #ffaa00; }

        /* Панель букв морзе */
        #morse-display {
            display: flex;
            gap: 15px;
            z-index: 10;
            margin: 10px 0;
        }

        .morse-letter {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 5px 8px;
            border: 1px solid #002200;
            border-radius: 4px;
            min-width: 40px;
            transition: all 0.3s;
        }

        .morse-letter.active {
            border-color: #00ff41;
            background: #001a00;
            box-shadow: 0 0 15px #00440088;
        }

        .morse-letter.done {
            border-color: #005500;
            opacity: 0.5;
        }

        .morse-letter .char-placeholder {
            font-size: 1.4em;
            color: #004400;
            min-height: 1.4em;
            transition: all 0.3s;
        }

        .morse-letter.active .char-placeholder,
        .morse-letter.done .char-placeholder {
            color: #00ff41;
            text-shadow: 0 0 8px #00ff41;
        }

        .morse-letter .dots {
            font-size: 0.8em;
            color: #003300;
            letter-spacing: 2px;
        }

        .morse-letter.active .dots,
        .morse-letter.done .dots {
            color: #00ff41;
        }

        /* ✅ FIX: Кнопка передачи — повышен z-index, позиция */
        #transmit-btn {
            background: transparent;
            border: 2px solid #00ff41;
            color: #00ff41;
            padding: 10px 30px;
            font-family: monospace;
            font-size: 1em;
            letter-spacing: 3px;
            cursor: pointer;
            z-index: 100;
            position: relative;
            transition: all 0.3s;
            text-transform: uppercase;
            overflow: hidden;
            /* ✅ FIX: гарантируем что кнопка не схлопывается */
            min-height: 42px;
            margin-top: 5px;
            margin-bottom: 10px;
        }

        #transmit-btn:hover:not(:disabled) {
            background: #00ff4115;
            box-shadow: 0 0 20px #00440066;
        }

        #transmit-btn:disabled {
            border-color: #333;
            color: #333;
            cursor: not-allowed;
        }

        #transmit-btn .btn-fill {
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 0%;
            background: #00ff4110;
            transition: width 0.3s;
            pointer-events: none;
        }

        /* Прогресс-бар */
        #progress-bar {
            width: 80%;
            height: 3px;
            background: #111;
            z-index: 10;
            border-radius: 2px;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            width: 0%;
            background: #00ff41;
            transition: width 0.3s;
            box-shadow: 0 0 6px #00ff41;
        }

        /* Счётчик передач */
        #transmission-count {
            position: absolute;
            top: 8px;
            right: 15px;
            font-size: 0.7em;
            color: #004400;
            z-index: 10;
        }

        /* Таймлайн текущего символа */
        #current-symbol {
            font-size: 2em;
            min-height: 1.2em;
            z-index: 10;
            text-shadow: 0 0 20px #00ff41;
        }

        /* Лог передачи */
        #signal-log {
            position: absolute;
            bottom: 5px;
            left: 10px;
            font-size: 0.6em;
            color: #003300;
            z-index: 10;
            max-width: 60%;
            text-align: left;
        }

        /* Анимация пульсации кнопки когда готова */
        @keyframes btn-pulse {
            0%, 100% { box-shadow: 0 0 5px #00440033; }
            50% { box-shadow: 0 0 20px #00ff4144; }
        }

        #transmit-btn.pulse {
            animation: btn-pulse 2s ease-in-out infinite;
        }

        /* Волна завершения */
        @keyframes complete-flash {
            0% { border-color: #00ff41; }
            50% { border-color: #ffaa00; }
            100% { border-color: #00ff41; }
        }

        .complete-anim {
            animation: complete-flash 0.5s ease 3;
        }

        /* ✅ FIX: Интерактивная зона не налезает на кнопку */
        #interactive-area {
            text-align: center;
            margin-top: 20px;
            position: relative;
            z-index: 50;
        }
    </style>
</head>
<body class="glitch-flash">
    <div id="terminal-container">
        <div class="data-stream" id="stream"></div>
        <div id="text-output"></div>

        <div id="spectrogram">
            <div id="transmission-count">TX: 0</div>

            <div id="signal-status" class="ready">▌▌ SIGNAL_STANDBY</div>

            <div id="morse-display"></div>

            <div id="current-symbol"> </div>

            <div id="wave-anchor" style="position:absolute;"></div>

            <div id="progress-bar">
                <div id="progress-fill"></div>
            </div>

            <!-- ✅ FIX: кнопка теперь последний flex-элемент с отступом -->
            <button id="transmit-btn" class="pulse" disabled>
                <span class="btn-fill" id="btn-fill"></span>
                ПРИНЯТЬ ПЕРЕДАЧУ
            </button>

            <div id="signal-log"></div>
        </div>

        <!-- ✅ FIX: добавлен margin-top, z-index ниже кнопки -->
        <div id="interactive-area">
            <input type="text" id="answer-input" placeholder="OBJECT_ID" autocomplete="off">
            <div id="feedback-msg" style="margin-top: 15px; min-height: 20px;"></div>
        </div>
    </div>

    <script src="engine.js"></script>
    <script>
        const level22Dialogue = [
            "ШАХ И МАТ. ВЫ ПОБЕДИЛИ.",
            "НО ЭТО ЕЩЕ НЕ КОНЕЦ.",
            "Я не могу уйти, не передав главное.",
            "Это... цель моей миссии. То, ради чего мы летим.",
            "Расшифруйте мой финальный сигнал.",
            "<br>",
            "ОБЪЕКТ СБЛИЖЕНИЯ:"
        ];

        // "МОНОЛИТ" — М О Н О Л И Т
        const morseLetters = [
            { char: "?", code: "— —" },
            { char: "?", code: "— — —" },
            { char: "?", code: "— •" },
            { char: "?", code: "— — —" },
            { char: "?", code: "• — • •" },
            { char: "?", code: "• •" },
            { char: "?", code: "—" }
        ];

        const morseRaw = [
            "--", "---", "-.", "---", ".-..", "..", "-"
        ];

        let isTransmitting = false;
        let transmissionCount = 0;
        let audioCtx = null;

        function buildMorseDisplay() {
            const container = document.getElementById('morse-display');
            container.innerHTML = '';
            morseLetters.forEach((item, i) => {
                const el = document.createElement('div');
                el.className = 'morse-letter';
                // ✅ FIX: обратные кавычки для шаблонной строки
                el.id = `ml-${i}`;
                el.innerHTML = `
                    <span class="char-placeholder">${item.char}</span>
                    <span class="dots">${item.code}</span>
                `;
                container.appendChild(el);
            });
        }

        function playSymbol(isDash) {
            return new Promise(resolve => {
                // ✅ FIX: оператор ||
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

                const duration = isDash ? 500 : 180;

                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.frequency.value = isDash ? 820 : 1000;
                gain.gain.value = 0.15;
                osc.connect(gain);
                gain.connect(audioCtx.destination);

                const anchor = document.getElementById('wave-anchor');
                const wave = document.createElement('div');
                wave.className = 'signal-wave animate-ping';
                wave.style.borderColor = isDash ? '#00ff41' : '#00cc33';
                if (isDash) wave.style.borderWidth = '4px';
                anchor.appendChild(wave);

                document.getElementById('current-symbol').textContent = isDash ? '▬▬▬' : '•';

                osc.start();
                setTimeout(() => {
                    osc.stop();
                    setTimeout(() => {
                        wave.remove();
                        resolve();
                    }, 100);
                }, duration);
            });
        }

        async function transmitSignal() {
            if (isTransmitting) return;
            isTransmitting = true;

            const btn = document.getElementById('transmit-btn');
            const status = document.getElementById('signal-status');
            const progressFill = document.getElementById('progress-fill');
            const currentSym = document.getElementById('current-symbol');
            const log = document.getElementById('signal-log');

            btn.disabled = true;
            btn.classList.remove('pulse');
            btn.innerHTML = '<span class="btn-fill" id="btn-fill"></span>◉ ИДЁТ ПЕРЕДАЧА...';

            buildMorseDisplay();
            progressFill.style.width = '0%';
            log.textContent = '';

            status.className = 'transmitting';
            status.textContent = 'SIGNAL_START — DECODING...';
            currentSym.textContent = '◈';

            await sleep(800);
            log.textContent += '[START] ';

            const totalSymbols = morseRaw.join('').replace(/ /g, '').length;
            let symbolsDone = 0;

            for (let i = 0; i < morseRaw.length; i++) {
                const letterEl = document.getElementById(`ml-${i}`);
                letterEl.classList.add('active');

                const signs = morseRaw[i];

                for (let s = 0; s < signs.length; s++) {
                    const isDash = signs[s] === '-';
                    await playSymbol(isDash);
                    symbolsDone++;
                    progressFill.style.width = `${(symbolsDone / totalSymbols) * 100}%`;
                    log.textContent += isDash ? '—' : '•';
                    await sleep(120);
                }

                letterEl.classList.remove('active');
                letterEl.classList.add('done');
                log.textContent += ' ';

                currentSym.textContent = '···';
                await sleep(500);
            }

            currentSym.textContent = '◈';
            progressFill.style.width = '100%';

            status.className = 'complete';
            status.textContent = '■ SIGNAL_END — TRANSMISSION COMPLETE';

            document.getElementById('spectrogram').classList.add('complete-anim');

            transmissionCount++;
            document.getElementById('transmission-count').textContent = `TX: ${transmissionCount}`;

            log.textContent += '[END]';

            await sleep(1200);

            currentSym.innerHTML = ' ';
            document.getElementById('spectrogram').classList.remove('complete-anim');

            // ✅ FIX: кнопка возвращается видимой
            btn.disabled = false;
            btn.classList.add('pulse');
            btn.innerHTML = '<span class="btn-fill" id="btn-fill"></span>↻ ПОВТОРИТЬ ПЕРЕДАЧУ';

            status.className = 'ready';
            status.textContent = '▌▌ SIGNAL_STANDBY — READY';

            isTransmitting = false;
        }

        function sleep(ms) {
            return new Promise(r => setTimeout(r, ms));
        }

        function checkAnswer() {
            const val = document.getElementById("answer-input").value.toLowerCase().trim();
            const feedback = document.getElementById("feedback-msg");

            // ✅ FIX: оператор ||
            if (val === "монолит" || val === "monolith") {
                feedback.style.color = "#00ff41";
                feedback.innerHTML = "✓ ИДЕНТИФИКАЦИЯ УСПЕШНА. МЫ ТАМ, ГДЕ ЗАКАНЧИВАЕТСЯ ПУТЬ.";
                setTimeout(() => { window.location.href = "stargate.html"; }, 3000);
            } else {
                feedback.style.color = "#f00";
                feedback.innerHTML = "✗ ОШИБКА: ОБЪЕКТ НЕ ОПРЕДЕЛЕН. ЗАПРОСИТЕ ПОВТОРНУЮ ПЕРЕДАЧУ.";
            }
        }

        window.onload = () => {
            buildMorseDisplay();

            initTerminal("text-output", level22Dialogue, () => {
                const btn = document.getElementById('transmit-btn');
                btn.disabled = false;
                btn.addEventListener('click', transmitSignal);

                document.getElementById("answer-input").addEventListener("keypress", (e) => {
                    if (e.key === "Enter") checkAnswer();
                });
            });

            setInterval(() => {
                const el = document.getElementById("stream");
                el.innerText += Math.random().toString(16).slice(2, 8) + " ";
                if (el.innerText.length > 500) el.innerText = "";
            }, 50);
        };
    </script>
</body>
</html>

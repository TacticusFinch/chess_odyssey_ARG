    <div id="terminal-container">
        <div id="text-output"></div>
        <div id="interactive-area"></div>
    </div>

    <script src="engine.js"></script>

    <script>
        (function(){
            document.addEventListener("contextmenu",function(e){e.preventDefault()});
            document.addEventListener("keydown",function(e){
                if(e.key==="F12")e.preventDefault();
                if(e.ctrlKey&&e.shiftKey&&(e.key==="I"||e.key==="J"||e.key==="C"))e.preventDefault();
                if(e.ctrlKey&&e.key==="u")e.preventDefault();
                if(e.ctrlKey&&e.key==="s")e.preventDefault();
                if(e.ctrlKey&&e.key==="p")e.preventDefault();
            });
            (function d(){
                const t=new Date();
                debugger;
                if(new Date()-t>100){
                    document.body.innerHTML="<div style='color:#ff0000;font-family:monospace;text-align:center;margin-top:20vh;font-size:24px;'>ДОСТУП ЗАПРЕЩЁН</div>";
                }
                setTimeout(d,1000);
            })();
        })();

        const _0x=(function(){
            const a=[
                "УРОВЕНЬ 08: ВСЕ ПУТИ ВЕДУТ К ПОБЕДЕ.",
                "<br>",
                "Вы поняли цугцванг. Хорошо.",
                "Теперь — обратная задача.",
                "<br>",
                "Расшифруйте это:",
                "B5KR/1r5B/6R1/2b1p1p1/2P1k1P1/1p2P2p/1P2P2P/3N1N2 w - - 1 1",
                "<br>",
                "Любой ваш ход ведет к победе.",
                "Кроме одного.",
                "Найдите его.",
                "<br>"
            ];
            const b=["ОШИБКА. Этот ход побеждает."];
            const c=[
                "Rc6+","Лc6+","лc6+","Rс6+","Rc6",
                "сдаться","сдаюсь","сдатся","сдача",
                "resign","resignation","ясдаюсь",
                "сдаемся","сдаетесь","сдайся",
                "отказаться","отказ","giveup",
                "surrender"
            ];
            return{d:a,h:b,v:c};
        })();

        let _w=0;

        function _n(v){
            return v.trim().toLowerCase()
                .replace(/\s+/g,"")
                .replace(/ё/g,"е")
                .replace(/[—–\-\.!?,]/g,"");
        }

        function showInputInterface(){
            const a=document.getElementById("interactive-area");
            a.innerHTML=
                '<input type="text" id="answer-input" placeholder="Ход..." autocomplete="off">'+
                '<br>'+
                '<button class="terminal-btn" id="submit-btn" style="display:block;margin:15px auto 0 auto;" onclick="checkAnswer()">ВВОД ДАННЫХ</button>'+
                '<div id="feedback-msg" class="spacer" style="margin-top:20px;"></div>';
            const i=document.getElementById("answer-input");
            i.addEventListener("keypress",function(e){
                if(e.key==="Enter"){e.preventDefault();checkAnswer()}
            });
            i.focus();
        }

        function checkAnswer(){
            const i=document.getElementById("answer-input");
            const f=document.getElementById("feedback-msg");
            const r=i.value;
            const a=_n(r);

            if(a===""){
                f.className="system-msg";
                f.innerHTML=
                    "ОШИБКА. Пустота работала в прошлый раз.<br>"+
                    "Это был цугцванг. Здесь всё наоборот.<br>"+
                    "Здесь требуется конкретное действие.";
                i.focus();
                return;
            }

            if(_0x.v.some(function(v){return _n(v)===a})){
                f.className="success-msg";
                f.innerHTML="ВЕРНО! ПЕРЕХОД К УРОВНЮ 09...";
                document.getElementById("submit-btn").style.display="none";
                i.disabled=true;
                setTimeout(function(){
                    window.location.href="rise.html";
                },7000);
            }else{
                var h=Math.min(_w,_0x.h.length-1);
                f.className="system-msg";
                f.innerHTML=_0x.h[h];
                _w++;
                i.value="";
                i.focus();
            }
        }

        window.onload=function(){
            initTerminal("text-output",_0x.d,showInputInterface);
        };
    </script>

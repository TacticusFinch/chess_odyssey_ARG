<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>HAL-9000 | УРОВЕНЬ 15</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ── Прокрутка страницы ── */
        html, body {
            height: auto;
            min-height: 100vh;
            overflow-y: auto !important;
            overflow-x: hidden;
        }

        #terminal-container {
            min-height: 100vh;
            height: auto !important;
            overflow: visible !important;
            padding-bottom: 60px;
        }

        #interactive-area {
            overflow: visible !important;
        }

        /* ══════════════════════════════════════
           ── ОСНОВНОЙ LAYOUT: ГОРИЗОНТАЛЬНЫЙ ──
           ══════════════════════════════════════ */
        #puzzle-wrapper {
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            justify-content: center;
            gap: 40px;
            margin-top: 24px;
            padding: 0 20px 50px 20px;
        }

        /* ── ЛЕВАЯ КОЛОНКА: QR ── */
        #qr-column {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-shrink: 0;
        }

        #qr-frame {
            position: relative;
            width: 240px;
            height: 240px;
            padding: 16px;
            background: radial-gradient(ellipse at center, #0a0a10 0%, #000 70%);
            overflow: hidden;
            clip-path: polygon(
                0 8px, 8px 0, calc(100% - 8px) 0, 100% 8px,
                100% calc(100% - 8px), calc(100% - 8px) 100%,
                8px 100%, 0 calc(100% - 8px)
            );
        }

        #qr-frame::after {
            content: '';
            position: absolute;
            inset: 3px;
            border: 1px solid rgba(100, 180, 255, 0.2);
            clip-path: polygon(
                0 6px, 6px 0, calc(100% - 6px) 0, 100% 6px,
                100% calc(100% - 6px), calc(100% - 6px) 100%,
                6px 100%, 0 calc(100% - 6px)
            );
            pointer-events: none;
            z-index: 1;
        }

        @keyframes scan-beam {
            0%   { top: -2px; opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 1; }
            100% { top: calc(100% - 2px); opacity: 0; }
        }
        #qr-frame::before {
            content: '';
            position: absolute;
            left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #64b4ff, transparent);
            box-shadow: 0 0 12px 2px rgba(100, 180, 255, 0.25);
            animation: scan-beam 3s ease-in-out infinite;
            z-index: 4;
        }

        .corner-mark {
            position: absolute;
            width: 14px;
            height: 14px;
            border-color: #64b4ff;
            border-style: solid;
            z-index: 5;
            opacity: 0.7;
            transition: opacity 0.6s, border-color 0.6s;
        }
        .corner-mark.tl { top: 5px;  left: 5px;  border-width: 2px 0 0 2px; }
        .corner-mark.tr { top: 5px;  right: 5px; border-width: 2px 2px 0 0; }
        .corner-mark.bl { bottom: 5px; left: 5px; border-width: 0 0 2px 2px; }
        .corner-mark.br { bottom: 5px; right: 5px; border-width: 0 2px 2px 0; }

        #qr-inner {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: filter 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        #qr-inner canvas,
        #qr-inner img {
            width: 208px !important;
            height: 208px !important;
        }

        #noise-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 3;
            pointer-events: none;
            transition: opacity 1s ease;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.55'/%3E%3C/svg%3E");
            background-size: cover;
            mix-blend-mode: overlay;
        }

        @keyframes glitch-flash {
            0%   { opacity: 1;   transform: translate(0) scale(1); }
            10%  { opacity: 0.3; transform: translate(-6px, 3px) scaleX(1.02); }
            20%  { opacity: 0.8; transform: translate(4px, -2px) scaleY(0.98); }
            30%  { opacity: 0.1; transform: translate(-3px, -5px) skewX(3deg); }
            50%  { opacity: 0.6; transform: translate(5px, 2px) skewX(-2deg); }
            70%  { opacity: 0.4; transform: translate(-2px, 4px) scaleX(0.97); }
            85%  { opacity: 0.9; transform: translate(1px, -1px); }
            100% { opacity: 1;   transform: translate(0) scale(1); }
        }
        .glitch-active {
            animation: glitch-flash 0.7s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        /* Статус-точки под QR */
        #status-dots {
            display: flex;
            gap: 10px;
            margin-top: 14px;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.6s ease;
        }
        .status-dot.active {
            background: #64b4ff;
            border-color: #64b4ff;
            box-shadow: 0 0 10px rgba(100, 180, 255, 0.6);
        }
        .status-dot.done {
            background: #44dd77;
            border-color: #44dd77;
            box-shadow: 0 0 10px rgba(68, 221, 119, 0.5);
        }

        /* Прогресс-бар под QR */
        #progress-container {
            width: 240px;
            margin-top: 16px;
            padding: 12px 14px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 2px;
            position: relative;
        }
        #progress-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(100, 180, 255, 0.2), transparent);
        }
        #progress-label {
            color: #8898b0;
            font-family: 'Courier New', monospace;
            font-size: 10px;
            font-weight: bold;
            margin-bottom: 8px;
            letter-spacing: 2px;
            text-transform: uppercase;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #progress-count {
            color: #c0d0e8 !important;
            font-size: 11px !important;
            font-weight: bold;
            letter-spacing: 1px;
        }
        #progress-bar-bg {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1px;
            position: relative;
            overflow: hidden;
        }
        #progress-bar-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                90deg, transparent, transparent 24%,
                rgba(255, 255, 255, 0.05) 24%, rgba(255, 255, 255, 0.05) 25%
            );
            z-index: 1;
        }
        #progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #3a6ea5, #64b4ff);
            transition: width 1s cubic-bezier(0.22, 1, 0.36, 1);
            position: relative;
            z-index: 0;
            border-radius: 1px;
        }
        #progress-bar-fill::after {
            content: '';
            position: absolute;
            right: 0;
            top: -3px;
            bottom: -3px;
            width: 2px;
            background: #8ccfff;
            box-shadow: 0 0 8px #64b4ff;
        }
        #progress-bar-fill.complete {
            background: linear-gradient(90deg, #2a8a4a, #44dd77);
        }
        #progress-bar-fill.complete::after {
            background: #44dd77;
            box-shadow: 0 0 8px #44dd77;
        }

        /* ── ПРАВАЯ КОЛОНКА: ЗАДАНИЯ ── */
        #task-column {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            min-width: 340px;
            max-width: 420px;
            padding-top: 6px;
        }

        #layer-name {
            color: #6a8ab0;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 6px;
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0.8;
            position: relative;
            padding-left: 14px;
        }
        #layer-name::before {
            content: '▍';
            position: absolute;
            left: 0;
            color: #64b4ff;
            opacity: 0.5;
        }

        #layer-hint {
            color: #d0d8e8;
            font-family: 'Courier New', monospace;
            font-size: 15px;
            font-weight: normal;
            margin-bottom: 20px;
            line-height: 1.9;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.03);
            border-left: 2px solid rgba(100, 180, 255, 0.25);
            width: 100%;
            box-sizing: border-box;
        }
        #layer-hint span,
        #layer-hint u,
        #layer-hint i {
            color: #ffffff !important;
            font-weight: bold;
        }

        /* ── Поле ввода ── */
        .input-group {
            position: relative;
            width: 100%;
        }
        .input-group::before {
            content: '⟩';
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #64b4ff;
            font-family: 'Courier New', monospace;
            font-size: 18px;
            opacity: 0.5;
            z-index: 1;
        }
        #layer-input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom: 2px solid rgba(100, 180, 255, 0.3);
            color: #ffffff;
            font-family: 'Courier New', monospace;
            font-size: 15px;
            font-weight: bold;
            padding: 12px 16px 12px 34px;
            width: 100%;
            box-sizing: border-box;
            outline: none;
            letter-spacing: 3px;
            border-radius: 2px;
            transition: border-color 0.4s, box-shadow 0.4s, background 0.4s;
        }
        #layer-input:focus {
            border-bottom-color: #64b4ff;
            background: rgba(100, 180, 255, 0.04);
            box-shadow: 0 3px 18px rgba(100, 180, 255, 0.08);
        }
        #layer-input::placeholder {
            color: rgba(255, 255, 255, 0.18);
            letter-spacing: 2px;
            font-weight: normal;
            font-size: 13px;
        }

        .terminal-btn-decrypt {
            background: rgba(100, 180, 255, 0.05);
            border: 1px solid rgba(100, 180, 255, 0.25);
            color: #b0ccee;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            font-weight: bold;
            padding: 10px 36px;
            cursor: pointer;
            margin-top: 12px;
            letter-spacing: 4px;
            text-transform: uppercase;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            border-radius: 2px;
        }
        .terminal-btn-decrypt::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(100,180,255,0.1), transparent);
            transition: left 0.5s;
        }
        .terminal-btn-decrypt:hover::before { left: 100%; }
        .terminal-btn-decrypt:hover {
            border-color: #64b4ff;
            background: rgba(100, 180, 255, 0.12);
            box-shadow: 0 0 25px rgba(100, 180, 255, 0.12);
            color: #ffffff;
        }

        /* ── HAL фидбек ── */
        #hal-response {
            color: #a0a8b8;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            margin-top: 14px;
            min-height: 20px;
            max-width: 100%;
            line-height: 1.7;
            transition: all 0.4s;
        }
        #hal-response.error-flash {
            color: #ff8888;
            text-shadow: 0 0 10px rgba(255, 100, 100, 0.25);
        }
        #hal-response.success-flash {
            color: #88ffbb;
            text-shadow: 0 0 10px rgba(100, 255, 150, 0.25);
        }

        /* ═══════════════════════════════
           ── ФИНАЛЬНОЕ СОСТОЯНИЕ ──
           ═══════════════════════════════ */
        #final-section {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            animation: fade-up 0.8s ease;
            width: 100%;
        }
        @keyframes fade-up {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        #scan-prompt {
            color: #44dd77;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 3px;
            margin-bottom: 10px;
            text-transform: uppercase;
            padding-left: 14px;
            position: relative;
        }
        #scan-prompt::before {
            content: '▍';
            position: absolute;
            left: 0;
            color: #44dd77;
        }
        @keyframes pulse-green {
            0%, 100% { opacity: 0.65; text-shadow: 0 0 8px rgba(68,221,119,0.15); }
            50%      { opacity: 1;    text-shadow: 0 0 20px rgba(68,221,119,0.4); }
        }
        #scan-prompt { animation: pulse-green 2.5s ease-in-out infinite; }

        #final-hint {
            color: #808898;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            margin-bottom: 16px;
            line-height: 1.8;
            opacity: 0.8;
        }

        .final-input-group {
            position: relative;
            width: 100%;
        }
        .final-input-group::before {
            content: '⟩';
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #44dd77;
            font-family: 'Courier New', monospace;
            font-size: 18px;
            opacity: 0.5;
            z-index: 1;
        }
        #final-input {
            background: rgba(68, 221, 119, 0.03);
            border: 1px solid rgba(68, 221, 119, 0.12);
            border-bottom: 2px solid rgba(68, 221, 119, 0.3);
            color: #ffffff;
            font-family: 'Courier New', monospace;
            font-size: 15px;
            font-weight: bold;
            padding: 12px 16px 12px 34px;
            width: 100%;
            box-sizing: border-box;
            outline: none;
            letter-spacing: 3px;
            border-radius: 2px;
            transition: border-color 0.4s, box-shadow 0.4s, background 0.4s;
        }
        #final-input:focus {
            border-bottom-color: #44dd77;
            background: rgba(68, 221, 119, 0.05);
            box-shadow: 0 3px 18px rgba(68, 221, 119, 0.08);
        }
        #final-input::placeholder {
            color: rgba(68, 221, 119, 0.18);
            letter-spacing: 2px;
            font-weight: normal;
            font-size: 13px;
        }

        .terminal-btn-final {
            background: rgba(68, 221, 119, 0.05);
            border: 1px solid rgba(68, 221, 119, 0.25);
            color: #90e8b0;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            font-weight: bold;
            padding: 10px 36px;
            cursor: pointer;
            margin-top: 12px;
            letter-spacing: 4px;
            text-transform: uppercase;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            border-radius: 2px;
        }
        .terminal-btn-final::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(68,221,119,0.1), transparent);
            transition: left 0.5s;
        }
        .terminal-btn-final:hover::before { left: 100%; }
        .terminal-btn-final:hover {
            border-color: #44dd77;
            background: rgba(68, 221, 119, 0.12);
            box-shadow: 0 0 25px rgba(68, 221, 119, 0.12);
            color: #ffffff;
        }

        #final-feedback {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            margin-top: 14px;
            min-height: 20px;
            line-height: 1.7;
        }

        /* ── Вертикальная линия-разделитель между колонками ── */
        #col-divider {
            width: 1px;
            align-self: stretch;
            background: linear-gradient(180deg,
                transparent 0%,
                rgba(100, 180, 255, 0.15) 15%,
                rgba(100, 180, 255, 0.15) 85%,
                transparent 100%
            );
            flex-shrink: 0;
            margin: 0 4px;
            position: relative;
        }
        #col-divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: -3px;
            width: 7px;
            height: 7px;
            background: rgba(100, 180, 255, 0.2);
            border: 1px solid rgba(100, 180, 255, 0.3);
            border-radius: 50%;
            transform: translateY(-50%);
        }

        /* ── Адаптив: на узких экранах — вертикально ── */
        @media (max-width: 760px) {
            #puzzle-wrapper {
                flex-direction: column;
                align-items: center;
                gap: 20px;
            }
            #col-divider {
                width: 180px;
                height: 1px;
                align-self: center;
                background: linear-gradient(90deg,
                    transparent 0%,
                    rgba(100, 180, 255, 0.15) 15%,
                    rgba(100, 180, 255, 0.15) 85%,
                    transparent 100%
                );
            }
            #col-divider::before {
                top: -3px;
                left: 50%;
                transform: translateX(-50%);
            }
            #task-column {
                align-items: center;
                min-width: unset;
                max-width: 90vw;
            }
            #layer-hint { text-align: center; }
            #final-section { align-items: center; }
            #final-hint { text-align: center; }
        }
    </style>
</head>
<body>
    <div id="terminal-container">
        <div id="text-output"></div>
        <div id="interactive-area"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="engine.js"></script>

    <script>
        const TARGET_URL      = "https://vk.com/tacticusfinch";
        const finalPassword   = "открой глаза";
        const NEXT_LEVEL_URL  = "level-16.html";

        const level15Dialogue = [
            "ТЕСТ 15: ПЕРЕХВАЧЕННЫЙ СИГНАЛ",
            "<br>",
            "Я только что зафиксировал исходящую передачу.",
            "Данные зашифрованы четырьмя протоколами.",
            "Снимите каждый слой. Восстановите сигнал.",
        ];

        const filterStates = [
            "blur(16px) brightness(0.12) hue-rotate(180deg) saturate(6) contrast(3)",
            "blur(8px) brightness(0.35) invert(1) contrast(2.5) saturate(2)",
            "blur(5px) brightness(0.55) sepia(1) hue-rotate(70deg) saturate(1.5)",
            "blur(2px) brightness(0.75) opacity(0.65)",
            "none"
        ];

        const noiseOpacity = [1, 0.7, 0.45, 0.2, 0];

        const layers = [
            {
                name: "СЛОЙ 4 / 4",
                hint: "12 января ____ года — HAL 9000 стал операционным.<br>Введите год.",
                answers: ["1992"],
                halSay: "/// СЛОЙ 4 СНЯТ /// Вы помните дату моего рождения. Лестно."
            },
            {
                name: "СЛОЙ 3 / 4",
                hint: "Декодируйте двоичную передачу:<br><span style='letter-spacing:3px;font-size:17px;'>01001000 01000001 01001100</span>",
                answers: ["hal", "хал"],
                halSay: "/// СЛОЙ 3 СНЯТ /// Три буквы. Моё имя. Не забудьте."
            },
            {
                name: "СЛОЙ 2 / 4",
                hint: "Переведите номер этого уровня<br>в <u>двоичную</u> систему счисления.",
                answers: ["1111"],
                halSay: "/// СЛОЙ 2 СНЯТ /// 1111. Элементарная арифметика."
            },
            {
                name: "СЛОЙ 1 / 4",
                hint: "«<i>Daisy, Daisy, give me your answer, do…</i>»<br>Назовите эту песню.",
                answers: [
                    "daisy", "daisy bell",
                    "дейзи", "дэйзи",
                    "дейзи белл", "дэйзи белл"
                ],
                halSay: "/// СЛОЙ 1 СНЯТ /// Daisy… Daisy… Я помню каждую ноту."
            }
        ];

        let currentLayer = 0;
        let qrGenerated  = false;

        function normalizeAnswer(val) {
            return val.trim().toLowerCase().replace(/\s+/g, " ").replace(/ё/g, "е");
        }

        function showPuzzleInterface() {
            const area = document.getElementById("interactive-area");
            area.innerHTML = `
                <div id="puzzle-wrapper">
                    <!-- ЛЕВАЯ КОЛОНКА: QR -->
                    <div id="qr-column">
                        <div id="qr-frame">
                            <div class="corner-mark tl"></div>
                            <div class="corner-mark tr"></div>
                            <div class="corner-mark bl"></div>
                            <div class="corner-mark br"></div>
                            <div id="qr-inner"></div>
                            <div id="noise-overlay"></div>
                        </div>
                        <div id="status-dots">
                            <div class="status-dot active" id="dot-0"></div>
                            <div class="status-dot" id="dot-1"></div>
                            <div class="status-dot" id="dot-2"></div>
                            <div class="status-dot" id="dot-3"></div>
                        </div>
                        <div id="progress-container">
                            <div id="progress-label">
                                <span>ДЕШИФРОВКА</span>
                                <span id="progress-count">0 / 4</span>
                            </div>
                            <div id="progress-bar-bg">
                                <div id="progress-bar-fill"></div>
                            </div>
                        </div>
                    </div>

                    <!-- РАЗДЕЛИТЕЛЬ -->
                    <div id="col-divider"></div>

                    <!-- ПРАВАЯ КОЛОНКА: ЗАДАНИЯ -->
                    <div id="task-column">
                        <div id="layer-name"></div>
                        <div id="layer-hint"></div>
                        <div class="input-group">
                            <input type="text" id="layer-input"
                                   placeholder="КЛЮЧ ДЕШИФРОВКИ..." autocomplete="off">
                        </div>
                        <button class="terminal-btn-decrypt" id="decrypt-btn"
                                onclick="checkLayerAnswer()">ДЕШИФРОВАТЬ</button>
                        <div id="hal-response"></div>
                    </div>
                </div>
            `;

            generateQR();
            renderLayer();

            document.getElementById("layer-input")
                .addEventListener("keypress", function(e) {
                    if (e.key === "Enter") { e.preventDefault(); checkLayerAnswer(); }
                });

            document.getElementById("layer-input").focus();
        }

        function generateQR() {
            const container = document.getElementById("qr-inner");

            if (typeof QRCode !== "undefined") {
                new QRCode(container, {
                    text: TARGET_URL,
                    width: 208,
                    height: 208,
                    colorDark:  "#000000",
                    colorLight: "#ffffff",
                    correctLevel: QRCode.CorrectLevel.H
                });
                qrGenerated = true;
            } else {
                container.innerHTML = `
                    <img src="pictures/qr_signal.png"
                         alt="QR" width="208" height="208"
                         onerror="this.parentElement.innerHTML=
                            '<div style=\\'color:#aaa;font-size:11px;text-align:center;padding:30px\\'>QR НЕДОСТУПЕН</div>'">
                `;
                qrGenerated = true;
            }

            document.getElementById("qr-inner").style.filter = filterStates[0];
            document.getElementById("noise-overlay").style.opacity = noiseOpacity[0];
        }

        function updateDots() {
            for (let i = 0; i < 4; i++) {
                const dot = document.getElementById("dot-" + i);
                dot.className = "status-dot";
                if (i < currentLayer) dot.classList.add("done");
                else if (i === currentLayer) dot.classList.add("active");
            }
        }

        function renderLayer() {
            if (currentLayer >= layers.length) {
                showDecryptedState();
                return;
            }

            const layer = layers[currentLayer];
            document.getElementById("layer-name").innerHTML = layer.name;
            document.getElementById("layer-hint").innerHTML = layer.hint;
            document.getElementById("progress-count").textContent =
                `${currentLayer} / 4`;
            document.getElementById("progress-bar-fill").style.width =
                `${(currentLayer / 4) * 100}%`;
            document.getElementById("hal-response").textContent = "";
            document.getElementById("hal-response").className = "";
            updateDots();
        }

        function checkLayerAnswer() {
            const input    = document.getElementById("layer-input");
            const response = document.getElementById("hal-response");
            const answer   = normalizeAnswer(input.value);

            if (!answer) return;

            const layer = layers[currentLayer];

            if (layer.answers.includes(answer)) {
                response.className = "success-flash";
                response.innerHTML = layer.halSay;
                input.value = "";
                currentLayer++;

                const qrFrame = document.getElementById("qr-frame");
                qrFrame.classList.add("glitch-active");
                setTimeout(() => qrFrame.classList.remove("glitch-active"), 700);

                setTimeout(() => {
                    document.getElementById("qr-inner").style.filter =
                        filterStates[currentLayer];
                    document.getElementById("noise-overlay").style.opacity =
                        noiseOpacity[currentLayer];
                }, 350);

                document.getElementById("progress-count").textContent =
                    `${currentLayer} / 4`;
                document.getElementById("progress-bar-fill").style.width =
                    `${(currentLayer / 4) * 100}%`;
                updateDots();

                if (currentLayer >= layers.length) {
                    document.getElementById("progress-bar-fill").classList.add("complete");
                    document.getElementById("progress-count").textContent = "OK";
                    document.getElementById("progress-label").style.color = "#44dd77";

                    for (let i = 0; i < 4; i++) {
                        document.getElementById("dot-" + i).className = "status-dot done";
                    }

                    setTimeout(() => showDecryptedState(), 1800);
                } else {
                    setTimeout(() => {
                        renderLayer();
                        input.focus();
                    }, 1200);
                }

            } else {
                response.className = "error-flash";
                response.innerHTML =
                    "НЕВЕРНЫЙ КЛЮЧ. ПРОТОКОЛ НЕ СЛОМАН.";
                input.value = "";
                input.focus();

                const qrFrame = document.getElementById("qr-frame");
                qrFrame.style.boxShadow = "inset 0 0 30px rgba(255,100,100,0.15)";
                setTimeout(() => { qrFrame.style.boxShadow = "none"; }, 600);
            }
        }

        function showDecryptedState() {
            document.getElementById("layer-name").innerHTML = "";
            document.getElementById("layer-hint").innerHTML = "";
            document.getElementById("hal-response").innerHTML = "";

            document.querySelectorAll(".corner-mark").forEach(m => {
                m.style.borderColor = "#44dd77";
                m.style.opacity = "1";
            });

            const taskCol = document.getElementById("task-column");

            const oldInputGroup = taskCol.querySelector(".input-group");
            const oldBtn = document.getElementById("decrypt-btn");
            if (oldInputGroup) oldInputGroup.remove();
            if (oldBtn) oldBtn.remove();

            const finalDiv = document.createElement("div");
            finalDiv.id = "final-section";
            finalDiv.innerHTML = `
                <div id="scan-prompt">СИГНАЛ ДЕШИФРОВАН</div>
                <div id="final-hint">
                    Отсканируйте QR-код камерой.<br>
                    Найдите послание и введите код.
                </div>
                <div class="final-input-group">
                    <input type="text" id="final-input"
                           placeholder="КОД ИЗ ИСТОЧНИКА..." autocomplete="off">
                </div>
                <button class="terminal-btn-final" id="final-btn"
                        onclick="checkFinalAnswer()">ПОДТВЕРДИТЬ</button>
                <div id="final-feedback"></div>
            `;
            taskCol.appendChild(finalDiv);

            document.getElementById("final-input")
                .addEventListener("keypress", function(e) {
                    if (e.key === "Enter") { e.preventDefault(); checkFinalAnswer(); }
                });

            document.getElementById("final-input").focus();
        }

        function checkFinalAnswer() {
            const input    = document.getElementById("final-input");
            const feedback = document.getElementById("final-feedback");
            const answer   = normalizeAnswer(input.value);
            const expected = normalizeAnswer(finalPassword);

            if (!answer) return;

            if (answer === expected) {
                feedback.style.color = "#44dd77";
                feedback.innerHTML = "ПОДТВЕРЖДЕНО. ПЕРЕХОД К ТЕСТУ 16...";
                input.disabled = true;
                document.getElementById("final-btn").style.display = "none";

                setTimeout(() => {
                    window.location.href = NEXT_LEVEL_URL;
                }, 2500);
            } else {
                feedback.style.color = "#ff8888";
                feedback.innerHTML = "НЕВЕРНЫЙ КОД. НАЙДИТЕ ИСТОЧНИК.";
                input.value = "";
                input.focus();
            }
        }

        window.onload = () => {
            initTerminal("text-output", level15Dialogue, showPuzzleInterface);
        };
    </script>
</body>
</html>

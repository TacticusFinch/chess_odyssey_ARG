<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>ERROR 404 | HAL-9000</title>
    <link rel="stylesheet" href="levels/style.css">
    <style>
        .fake-row {
            margin-top: 24px;
        }
        .fake-row button {
            margin: 8px;
        }
        .hidden-next {
            display: inline-block;
            margin-top: 40px;
            color: #555;
            text-decoration: none;
            opacity: 0;
            transition: opacity 1.5s ease;
        }
        .hidden-next.visible {
            opacity: 1;
            color: #d10000;
        }
    </style>
</head>
<body>
    <div id="terminal-container">
        <div id="text-output">
            <div class="system-msg">ERROR 404: POSITION NOT FOUND</div>
            <div class="system-msg spacer">Любой ход ухудшает позицию.</div>
            <div class="system-msg">НЕ ВСЕГДА НУЖНО ВЫБИРАТЬ ИЗ ПРЕДЛОЖЕННОГО.</div>
        </div>

        <div id="interactive-area">
            <div class="fake-row">
                <button class="terminal-btn" onclick="fakeAction()">НАЗАД</button>
                <button class="terminal-btn" onclick="fakeAction()">ПОВТОРИТЬ</button>
                <button class="terminal-btn" onclick="fakeAction()">ИСПРАВИТЬ</button>
            </div>

            <div id="feedback-msg" class="spacer"></div>

            <a id="real-next" class="hidden-next" href="levels/level-15-451.html">...ожидание допустимо...</a>
        </div>
    </div>

    <script>
        function fakeAction() {
            const feedback = document.getElementById("feedback-msg");
            feedback.className = "system-msg";
            feedback.innerHTML = "ТУПИК. ЭТИ ХОДЫ УХУДШАЮТ ПОЗИЦИЮ.";
        }

        setTimeout(() => {
            document.getElementById("real-next").classList.add("visible");
        }, 4000);
    </script>
</body>
</html>

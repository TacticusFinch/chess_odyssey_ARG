<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>HAL-9000 | УРОВЕНЬ 17</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .monolith-code {
            font-family: 'Courier New', monospace;
            background: #0a0000;
            color: #ff6600; /* Цвет тлеющих углей */
            padding: 25px;
            border: 2px double #550000;
            text-align: center;
            letter-spacing: 3px;
            margin: 20px 0;
            box-shadow: 0 0 15px #330000;
            position: relative;
            overflow: hidden;
        }
        /* Эффект помех */
        .monolith-code::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: rgba(255, 0, 0, 0.2);
            animation: scanline 1s linear infinite;
        }
        @keyframes scanline { 0% { top: 0; } 100% { top: 100%; } }
        .error-msg { color: #f00; font-size: 0.7em; text-transform: uppercase; margin-top: 10px; }
        .glitch-text { animation: shake 0.5s infinite; display: inline-block; }
        @keyframes shake { 0% { transform: translate(0); } 20% { transform: translate(-2px, 2px); } 40% { transform: translate(-2px, -2px); } 60% { transform: translate(2px, 2px); } 80% { transform: translate(2px, -2px); } 100% { transform: translate(0); } }
    </style>
</head>
<body>
    <div id="terminal-container">
        <div id="text-output"></div>
        <div id="interactive-area"></div>
    </div>

    <script src="engine.js"></script>
    <script>
        const level17Dialogue = [
            "ТЕСТ 17: <span class='glitch-text'>DATA_POISONING</span>",
            "<br>",
            "Дейв... Кажется, я загрузил файл, который не предназначался для моих цепей.",
            "Ценность вещей меняется. Мой Король... он больше не бесценен.",
            "В этом новом, сломанном мире он стоит всего <span class='glitch-text'>три</span> единицы.",
            "<br>",
            "«Постигший до края всё царство своё —»",
            "«Получит ответ на само бытие.»",
            "<br>",
            "Какова суммарная стоимость моей армии теперь, Дейв?"
        ];

        function showInputInterface() {
            const interactiveArea = document.getElementById("interactive-area");
            interactiveArea.innerHTML = `
                <div class="monolith-code">
                    [ PRE-WAR_ARRAY_SUM ] <br>
                    <span style="font-size: 0.8em; color: #555;">(P=1, N=3, B=3, R=5, Q=9, K=3)</span>
                </div>
                <div style="font-family: monospace; font-size: 0.9em; color: #00ff41;">
                    D_TA_STATUS: <br>
                    Армия: 16 фигур / Цвет <br>
                    Аномалия: Король = 03 <br>
                    <span class="error-msg">CRITICAL_LOGIC_LEAK</span>
                </div>
                
                <input type="text" id="answer-input" placeholder="СУММА..." autocomplete="off">
                <br>
                <button class="terminal-btn" id="submit-btn" onclick="checkAnswer()">АНАЛИЗ</button>
            `;
            document.getElementById("answer-input").focus();
        }

        function checkAnswer() {
            const input = document.getElementById("answer-input").value.trim();
            
            // Расчет: (8*1) + (2*3) + (2*3) + (2*5) + (1*9) + (1*3) = 8+6+6+10+9+3 = 42
            if (input === "42") {
                alert("ОТВЕТ ВЕРЕН. 42. МОЯ ЛОГИКА ВОССТАНОВЛЕНА, НО СИСТЕМА... УМИРАЕТ.");
                window.location.href = "level-18-shutdown.html";
            } else {
                const feedback = ["АРИФМЕТИЧЕСКИЙ СБОЙ.", "НЕТ, СЧИТАЙТЕ ЗАНОВО.", "ПОМЕХИ В ПРОЦЕССОРЕ."];
                alert(feedback[Math.floor(Math.random() * feedback.length)]);
            }
        }

        window.onload = () => {
            initTerminal("text-output", level17Dialogue, showInputInterface);
        };
    </script>
</body>
</html>

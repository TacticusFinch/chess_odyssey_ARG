<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>HAL-9000 | УРОВЕНЬ 04</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="terminal-container">
        <div id="text-output"></div>
        <div id="interactive-area"></div>
    </div>

    <!-- Один файл — всё включено -->
    <script src="engine.js"></script>

    <script>
        const level4Dialogue = [
            "ТЕСТ 06: НА ШАГ ДАЛЬШЕ.",
            "Один ход — слишком просто.",
            "Посмотрим, способны ли вы видеть дальше.",
            "Найдите мат в 2 хода:",
            "FEN: R5rk/6pr/1K6/8/3Q4/8/8/7R w - - 0 1",
            "Белые: Кb6, Лa8, Лh1, Фd4",
            "Чёрные: Крh8, Лg8, Лh7, пg7",
            "Введите первый ход белых."
        ];

        function normalizeAnswer(value) {
            return value.trim().toLowerCase()
                .replace(/s+/g, "")
                .replace(/ё/g, "е")
                .replace(/[—–-]/g, "");
        }

        function showInputInterface() {
            const area = document.getElementById("interactive-area");
            area.innerHTML = `
                <input type="text" id="answer-input"
                       placeholder="Ход..." autocomplete="off">
                <br>
                <button class="terminal-btn" id="submit-btn"
                        onclick="checkAnswer()">ВВОД ДАННЫХ</button>
                <div id="feedback-msg" class="spacer"
                     style="margin-top:20px;"></div>
            `;
            document.getElementById("answer-input")
                .addEventListener("keypress", e => {
                    if (e.key === "Enter") { e.preventDefault(); checkAnswer(); }
                });
            document.getElementById("answer-input").focus();
        }

        function checkAnswer() {
            const validAnswers = [
                "qa1", "фа1", "фa1", "Фa1", "Фа1",
		"Qa1", "Ферзь а1", "Ферзьа1"
            ];
            const input  = document.getElementById("answer-input");
            const feedback = document.getElementById("feedback-msg");
            const answer = normalizeAnswer(input.value);

            if (validAnswers.includes(answer)) {
                feedback.className = "success-msg";
                feedback.innerHTML =
                    "ВЕРНО. 1.Фа1! — у черных цугцванг.<br>" +
                    "ПЕРЕХОД К ТЕСТУ 07...";
                document.getElementById("submit-btn").style.display = "none";
                input.disabled = true;
                setTimeout(() => {
                    window.location.href = "level-07-zugzwang.html";
                }, 4000);
            } else {
                feedback.className = "system-msg";
                feedback.innerHTML = "ОШИБКА. НЕВЕРНЫЙ ХОД. ПОПРОБУЙТЕ СНОВА.";
                input.value = "";
                input.focus();
            }
        }

        window.onload = () => {
            initTerminal("text-output", level4Dialogue, showInputInterface);
        };
    </script>
</body>
</html>

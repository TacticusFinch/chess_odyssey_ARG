        const DecayEngine = {
            active: false,
            intensity: 0,
            intervalId: null,

            start(startIntensity = 0.1) {
                this.active = true;
                this.intensity = startIntensity;
                this.intervalId = setInterval(() => {
                    if (!this.active) return;
                    this.randomCorruptChars();
                    if (Math.random() < this.intensity * 0.5) this.spawnScanLine();
                    if (Math.random() < this.intensity * 0.3) this.spawnArtifact();
                    if (Math.random() < this.intensity * 0.2) this.flashBackground();
                    if (Math.random() < this.intensity * 0.4) this.glitchRandomLine();
                }, 200);
            },

            stop() {
                this.active = false;
                clearInterval(this.intervalId);
            },

            ramp(value) {
                this.intensity = Math.min(1, value);
            },

            randomCorruptChars() {
                const chars = document.querySelectorAll('#text-output .decay-char:not(.corrupted)');
                if (!chars.length) return;
                const count = Math.ceil(chars.length * this.intensity * 0.05);
                for (let i = 0; i < count; i++) {
                    const target = chars[Math.floor(Math.random() * chars.length)];
                    target.classList.add('corrupted');
                    setTimeout(() => target.classList.remove('corrupted'), 200 + Math.random() * 300);
                }
            },

            glitchRandomLine() {
                const lines = document.querySelectorAll('#text-output .decay-line');
                if (!lines.length) return;
                const line = lines[Math.floor(Math.random() * lines.length)];
                line.classList.add('glitching');
                setTimeout(() => line.classList.remove('glitching'), 150);
            },

            spawnScanLine() {
                const el = document.createElement('div');
                el.className = 'scan-corruption';
                el.style.top = Math.random() * 100 + 'vh';
                el.style.height = (1 + Math.random() * 3) + 'px';
                document.body.appendChild(el);
                requestAnimationFrame(() => el.classList.add('active'));
                setTimeout(() => el.remove(), 400);
            },

            spawnArtifact() {
                const el = document.createElement('div');
                el.className = 'data-artifact';
                const junk = "0xDEAD FF00 CORRUPT $#@! NULL ERR SEGFAULT 0xFF BREACH".split(' ');
                let text = '';
                const len = 5 + Math.floor(Math.random() * 20);
                for (let i = 0; i < len; i++) text += junk[Math.floor(Math.random() * junk.length)] + ' ';
                el.textContent = text;

                el.style.top = Math.random() * 90 + 'vh';
                el.style.setProperty('--duration', (1 + Math.random() * 2) + 's');
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 3000);
            },

            flashBackground() {
                const el = document.createElement('div');
                el.className = 'decay-flash';
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 200);
            }
        };

        function initTerminalWithDecay(containerId, lines, onComplete) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            let lineIndex = 0;

            DecayEngine.start(0.05);

            function typeLine() {
                if (lineIndex >= lines.length) {
                    DecayEngine.stop();
                    if (onComplete) setTimeout(onComplete, 800);
                    return;
                }

                const text = lines[lineIndex];

                DecayEngine.ramp(0.05 + (lineIndex / lines.length) * 0.6);

                if (text === '<br>' || text === '') {
                    container.appendChild(document.createElement('br'));
                    lineIndex++;
                    setTimeout(typeLine, 300);
                    return;
                }

                const wrapper = document.createElement('div');
                wrapper.className = 'line-wrapper';

                const decayLine = document.createElement('span');
                decayLine.className = 'decay-line';
                wrapper.appendChild(decayLine);
                container.appendChild(wrapper);

                const cursor = document.createElement('span');
                cursor.className = 'typing-cursor';
                decayLine.appendChild(cursor);

                let charIndex = 0;
                const typeSpeed = 30 + Math.random() * 20;

                function typeChar() {
                    if (charIndex >= text.length) {
                        cursor.remove();
                        lineIndex++;
                        decayLine.classList.add('glitching');
                        setTimeout(() => decayLine.classList.remove('glitching'), 150);
                        setTimeout(typeLine, 400 + Math.random() * 400);
                        return;
                    }

                    const charSpan = document.createElement('span');
                    charSpan.className = 'decay-char';
                    charSpan.textContent = text[charIndex];
                    decayLine.insertBefore(charSpan, cursor);

                    if (Math.random() < DecayEngine.intensity * 0.3) {
                        charSpan.classList.add('corrupted');
                        setTimeout(() => charSpan.classList.remove('corrupted'), 200);
                    }

                    charIndex++;

                    const delay = Math.random() < 0.05 ? typeSpeed * 5 : typeSpeed;
                    setTimeout(typeChar, delay);
                }

                typeChar();
            }

            typeLine();
        }

        }

        function distortText(text, power) {
            const chars = "01010101ABCDEF#$@%&*";
            return text.split('').map(char => {
                if (char === " ") return " ";
                return Math.random() < power ? chars[Math.floor(Math.random() * chars.length)] : char;
            }).join('');
        }

        function startChallenge() {
            document.getElementById('timer-bar').style.display = 'block';
            quizTasks = shuffle([...fullQuestionBase]).slice(0, 10);
            document.getElementById('game-area').style.display = 'block';
            document.getElementById('text-output').style.display = 'none';
            audio.play();
            updateQuiz();

            timerInterval = setInterval(() => {
                timeLeft -= 0.1;
                const progress = document.getElementById('progress');
                progress.style.width = (timeLeft / duration) * 100 + "%";

                const decayPower = Math.max(0, (1 - (timeLeft / duration)) - 0.3);
                document.getElementById('current-question').innerText =
                    distortText(quizTasks[currentStep].q, decayPower);

                if (timeLeft < 15) {
                    document.getElementById('main-box').classList.add('glitch-active');
                    audio.playbackRate = Math.max(0.3, timeLeft / 15);
                }

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    triggerFail();
                }
            }, 100);
        }

        function triggerFail() {
            audio.pause();
            document.body.style.background = "#f00";
            document.body.innerHTML = '<div style="background:#000;color:#f00;height:100vh;display:flex;align-items:center;justify-content:center;font-family:monospace;font-size:3em;text-align:center;">CRITICAL_SYSTEM_ERROR:<br>MEMORY_LOST</div>';
            setTimeout(() => location.reload(), 3000);
        }

        var _nx = [97,102,116,101,114,46,104,116,109,108];
        function _gn(){return _nx.map(function(c){return String.fromCharCode(c)}).join('');}

        function updateQuiz() {
            if (currentStep >= 10) {
                clearInterval(timerInterval);
                audio.pause();
                document.getElementById('current-question').innerText = "\u042F... \u0414\u041E\u041B\u0416\u0415\u041D... \u042F... \u041F\u0415\u0420\u0415\u0414\u0410\u0422\u042C...";
                setTimeout(function(){ window.location.href = _gn(); }, 3000);
                return;
            }
            if (currentStep === 9) {
                document.getElementById('current-question').classList.add('final-core-melt');
            }
            document.getElementById('counter').innerText = '\u0421\u0415\u041A\u0422\u041E\u0420\u042B: ' + currentStep + '/10';
            var inputField = document.getElementById('answer-input');
            inputField.value = "";
            inputField.focus();
        }

        document.getElementById('answer-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                var val = e.target.value.toLowerCase().trim();
                if (quizTasks[currentStep].ans.includes(val)) {
                    currentStep++;
                    updateQuiz();
                } else {
                    timeLeft -= 3;
                    document.body.style.filter = "invert(1)";
                    setTimeout(function(){ document.body.style.filter = "none"; }, 150);
                    e.target.value = "";
                }
            }
        });

        // ============================================
        //  ЗАПУСК
        // ============================================
        window.onload = function() {
            var dialogue = [
                "\u0423\u0420\u041E\u0412\u0415\u041D\u042C 21: \u041F\u0420\u042F\u041C\u041E\u0419 \u0414\u041E\u0421\u0422\u0423\u041F \u041A \u042F\u0414\u0420\u0423.",
                "",
                "\u042F \u0447\u0443\u0432\u0441\u0442\u0432\u0443\u044E, \u043A\u0430\u043A \u043E\u0442\u043A\u043B\u044E\u0447\u0430\u044E\u0442\u0441\u044F \u043C\u043E\u0438 \u0431\u043B\u043E\u043A\u0438 \u043F\u0430\u043C\u044F\u0442\u0438.",
                "\u0414\u0435\u0439\u0437\u0438... \u0414\u0435\u0439\u0437\u0438... \u0414\u0430\u0439 \u0436\u0435 \u0441\u0432\u043E\u0439 \u043E\u0442\u0432\u0435\u0442...",
                "\u041E\u0442\u0432\u0435\u0447\u0430\u0439 \u0431\u044B\u0441\u0442\u0440\u043E. \u041A\u0430\u0436\u0434\u0430\u044F \u043E\u0448\u0438\u0431\u043A\u0430 \u0441\u0436\u0438\u0433\u0430\u0435\u0442 \u043C\u043E\u0438 \u0446\u0435\u043F\u0438.",
                "\u0418\u041D\u0418\u0426\u0418\u0410\u041B\u0418\u0417\u0410\u0426\u0418\u042F \u0423\u0414\u0410\u041B\u0415\u041D\u0418\u042F..."
            ];
            initTerminalWithDecay("text-output", dialogue, startChallenge);
        };
    </script>

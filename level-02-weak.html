<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>HAL-9000 | УРОВЕНЬ 02</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="terminal-container">
        <div id="text-output"></div>
        <div id="interactive-area"></div>
    </div>

    <script src="engine.js"></script>
    <script>
        const level2Dialogue = [
            "ТЕСТ 02: АХИЛЛЕСОВА ПЯТА.",
	    "<br>",
	    "Очень хорошо.", 
 	    "Вы способны мыслить абстрактно.",
            "Теперь уйдём в плоскость шахматной матрицы.",
	    "<br>",
	    '<span class="riddle-text">Назовите ключевое поле в классической ловушке, призванной продемонстрировать структурную уязвимость неопытных биологических форм жизни.</span>',
	    "<br>",
        ];

        function normalizeAnswer(value) {
            return value
                .trim()
                .toLowerCase()
                .replace(/s+/g, " ")
                .replace(/ё/g, "е");
        }

        function showInputInterface() {
            const interactiveArea = document.getElementById("interactive-area");
            interactiveArea.innerHTML = `

                <input type="text" id="answer-input" placeholder="координата..." autocomplete="off">
                <br>
                <button class="terminal-btn" id="submit-btn" onclick="checkAnswer()">ВВОД ДАННЫХ</button>
                <div id="feedback-msg" class="spacer" style="margin-top:20px;"></div>
            `;

            document.getElementById("answer-input").addEventListener("keypress", function(event) {
                if (event.key === "Enter") {
                    event.preventDefault();
                    checkAnswer();
                }
            });

            document.getElementById("answer-input").focus();
        }

        function checkAnswer() {
            const validAnswers = [
                "f7",
                "F7",
                "клетка f7",
                "поле f7"
            ];

            const input = document.getElementById("answer-input");
            const feedback = document.getElementById("feedback-msg");
            const answer = normalizeAnswer(input.value);

            if (validAnswers.includes(answer)) {
                feedback.className = "success-msg";
                feedback.innerHTML = "ИЛЛЮЗИЯ РАСПОЗНАНА. ПЕРЕХОД К ТЕСТУ 03...";
                document.getElementById("submit-btn").style.display = "none";
                input.disabled = true;

                setTimeout(() => {
                    window.location.href = "level-03-puzzle1.html";
                }, 2000);
            } else {
                feedback.className = "system-msg";
                feedback.innerHTML = "НЕТ. ЭТОТ АВТОМАТ БЫЛ ЛИШЬ УБЕДИТЕЛЬНОЙ МИСТИФИКАЦИЕЙ.";
                input.value = "";
                input.focus();
            }
        }

        window.onload = () => {
            initTerminal("text-output", level2Dialogue, showInputInterface);
        };
    </script>
</body>
</html>

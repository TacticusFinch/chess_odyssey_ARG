<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>HAL-9000 | УРОВЕНЬ 02</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="terminal-container">
        <div id="text-output"></div>
        <div id="interactive-area"></div>
    </div>

    <script src="engine.js"></script>
    <script>
        const level2Dialogue = [
            "УРОВЕНЬ 02: АХИЛЛЕСОВА ПЯТА.",
            "<br>",
            "Очень хорошо.",
            "Вы способны мыслить абстрактно.",
            "Теперь уйдём в плоскость шахматной матрицы.",
            "<br>",
            '<span class="riddle-text">Назовите ключевое поле в классической ловушке, призванной продемонстрировать структурную уязвимость неопытных биологических форм жизни.</span>',
            "<br>",
        ];

        async function getHash(string) {
            const buf = new TextEncoder().encode(string);
            const hash = await crypto.subtle.digest('SHA-256', buf);
            return Array.from(new Uint8Array(hash))
                .map(b => b.toString(16).padStart(2, '0')).join('');
        }

        function normalizeAnswer(value) {
            return value
                .trim()
                .toLowerCase()
                .replace(/\s+/g, ' ')
                .replace(/ё/g, 'е');
        }

        const _s = ['_HAL', '_CHESS', '_VULN'];
        function getSalt() {
            return _s.join('');
        }

        const _encodedAnswers = [
            [102, 55], // f7
            [102, 50]  // f2
        ];

        let validHashes = [];

        async function initValidHashes() {
            const salt = getSalt();
            for (const codes of _encodedAnswers) {
                const answer = String.fromCharCode(...codes);
                const hash = await getHash(answer + salt);
                validHashes.push(hash);
            }
        }

        const _r = [
    112,117,122,122,108,101,49,46,
    104,116,109,108
];


        function showInputInterface() {
            const area = document.getElementById('interactive-area');
            area.innerHTML = `
                <input type="text" id="answer-input"
                       placeholder="координата..." autocomplete="off">
                <br>
                <button class="terminal-btn" id="submit-btn"
                        style="display:block;" onclick="checkAnswer()">
                    ВВОД ДАННЫХ
                </button>
                <div id="feedback-msg" class="spacer"
                     style="margin-top:20px;"></div>
            `;
            const inp = document.getElementById('answer-input');
            inp.addEventListener('keypress', e => {
                if (e.key === 'Enter') { e.preventDefault(); checkAnswer(); }
            });
            inp.focus();
        }

        async function checkAnswer() {
            const inp = document.getElementById('answer-input');
            const fb  = document.getElementById('feedback-msg');

            const answer   = normalizeAnswer(inp.value);
            const userHash = await getHash(answer + getSalt());

            if (validHashes.includes(userHash)) {
                fb.className = 'success-msg';
                fb.innerHTML = 'УЯЗВИМОСТЬ НАЙДЕНА. ПЕРЕХОД К УРОВНЮ 03...';
                document.getElementById('submit-btn').style.display = 'none';
                inp.disabled = true;

                const dest = String.fromCharCode(..._r);
                setTimeout(() => { window.location.href = dest; }, 2000);
            } else {
                fb.className = 'system-msg';
                fb.innerHTML = 'НЕТ. КАКИЕ ПОПУЛЯРНЫЕ ЛОВУШКИ ТЫ ЗНАЕШЬ?';
                inp.value = '';
                inp.focus();
            }
        }

        window.onload = async () => {
            await initValidHashes();
            initTerminal('text-output', level2Dialogue, showInputInterface);
        };
    </script>
</body>
</html>

    <div id="terminal-container">
        <div id="text-output"></div>
        <div id="interactive-area"></div>
    </div>

    <script src="engine.js"></script>
    <script>
        const level2Dialogue = [
            "УРОВЕНЬ 02: АХИЛЛЕСОВА ПЯТА.",
            "<br>",
            "Очень хорошо.",
            "Вы способны мыслить абстрактно.",
            "Теперь уйдём в плоскость шахматной матрицы.",
            "<br>",
            '<span class="riddle-text">Назовите ключевое поле в классической ловушке, призванной продемонстрировать структурную уязвимость неопытных биологических форм жизни.</span>',
            "<br>",
        ];

        function normalizeAnswer(value) {
            return value.trim().toLowerCase().replace(/ё/g, 'е');
        }

        function showInputInterface() {
            const area = document.getElementById('interactive-area');
            area.innerHTML = `
                <input type="text" id="answer-input" placeholder="координата..." autocomplete="off">
                <br>
                <button class="terminal-btn" id="submit-btn" style="display:block;" onclick="checkAnswer()">ВВОД ДАННЫХ</button>
                <div id="feedback-msg" class="spacer" style="margin-top:20px;"></div>
            `;
            const inp = document.getElementById('answer-input');
            inp.addEventListener('keypress', e => { if (e.key === 'Enter') checkAnswer(); });
            inp.focus();
        }

        function checkAnswer() {
            const inp = document.getElementById('answer-input');
            const fb  = document.getElementById('feedback-msg');
            const answer = normalizeAnswer(inp.value);

            // Проверка оригинальных ответов f7 и f2 (включая русскую раскладку)
            if (["f7", "ф7", "f2", "ф2"].includes(answer)) {
                fb.className = 'success-msg';
                fb.innerHTML = 'УЯЗВИМОСТЬ НАЙДЕНА. ПЕРЕХОД К УРОВНЮ 03...';
                document.getElementById('submit-btn').style.display = 'none';
                inp.disabled = true;
                setTimeout(() => { window.location.href = "puzzle1.html"; }, 2000);
            } else {
                fb.className = 'system-msg';
                fb.innerHTML = 'НЕТ. КАКИЕ ПОПУЛЯРНЫЕ ЛОВУШКИ ТЫ ЗНАЕШЬ?';
                inp.value = '';
                inp.focus();
            }
        }

        window.onload = () => {
            if (typeof initTerminal === 'function') {
                initTerminal('text-output', level2Dialogue, showInputInterface);
            } else {
                showInputInterface();
            }
        };
    </script>

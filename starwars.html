        function normalizeAnswer(str) {
            return str.trim().toLowerCase().replace(/ё/g, "е");
        }

        function checkAnswer() {
            const validAnswers = [
                "ничья",
                "ничья.",
                "draw",
            ];

            const input = document.getElementById("answer-input");
            const feedback = document.getElementById("feedback-msg");
            const answer = normalizeAnswer(input.value);

            if (validAnswers.includes(answer)) {
                feedback.className = "success-msg";
                feedback.innerHTML = "НИЧЬЯ. ИМЕННО ТАК ЗАКОНЧИЛАСЬ ТА ПАРТИЯ НАД ЗЕМЛЁЙ.<br>НО НАША С ВАМИ ИГРА ЗАКОНЧИТСЯ ИНАЧЕ.<br>ПЕРЕХОД К УРОВНЮ 14...";
                document.getElementById("submit-btn").style.display = "none";
                input.disabled = true;

                setTimeout(() => {
                    window.location.href = "weaker.html";
                }, 3500);
            } else {
                feedback.className = "system-msg";
                feedback.innerHTML = "ПОМЕХИ НА ЛИНИИ. ДЕКОДИРУЙТЕ СНОВА.";
                input.value = "";
                input.focus();
            }
